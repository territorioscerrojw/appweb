<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de Grupo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    :root {
      --font-family: 'Outfit', sans-serif;
      --fs-h1: 28px; --fs-tabs: 16px; --fs-th: 16px; --fs-td: 16px;
      --btn-size: 48px; --icon-size: 24px;
      /* MODO OSCURO (Default) */
      --bg: #0b0f19; --card-bg: #1a202d; --text: #ffffff; 
      --text-dim: #707785; --accent: #3b82f6;
      /* Colores Cabecera Unificada (Invertidos) */
      --top-bg: #ffffff; --top-text: #0b0f19;
    }
    [data-theme='light'] {
      /* MODO CLARO */
      --bg: #ffffff; --card-bg: #f4f4f7; --text: #0b0f19;
      --text-dim: #6e6e73; --accent: #0066cc;
      --top-bg: #0b0f19; --top-text: #ffffff;
    }

    * { box-sizing: border-box; max-width: 100vw; }
    body { font-family: var(--font-family); background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }

    /* Nueva área superior unificada */
    .top-header-area { 
      background: var(--top-bg); 
      color: var(--top-text); 
      padding: 20px 15px 0 15px; 
    }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: var(--fs-h1); margin: 0; }
    
    .btn-icon { background: transparent; border: 1px solid var(--top-text); border-radius: 50%; width: var(--btn-size); height: var(--btn-size); cursor: pointer; color: var(--top-text); display: flex; align-items: center; justify-content: center; padding: 0; font-size: var(--icon-size); }

    .tabs { display: flex; margin-top: 10px; }
    .tab { flex: 1; padding: 15px; text-align: center; font-size: var(--fs-tabs); color: var(--top-text); cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7; }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); opacity: 1; font-weight: 600; }

    /* Contenido inferior */
    .main-content { padding: 15px; }
    .card { background: var(--card-bg); border-radius: 16px; overflow-x: auto; margin-bottom: 20px; width: 100%; }
    table { width: 100%; border-collapse: collapse; min-width: 300px; }
    th { font-size: var(--fs-th); color: var(--text-dim); padding: 16px; text-transform: uppercase; cursor: pointer; text-align: left; }
    td { font-size: var(--fs-td); padding: 16px; border-top: 1px solid #2d3748; cursor: pointer; }
    .sort-icon { display: inline-block; width: 6px; height: 6px; border-right: 1.5px solid var(--text-dim); border-bottom: 1.5px solid var(--text-dim); transform: rotate(45deg); margin-left: 8px; }

    .visor { position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 15px; overflow-y: auto; display: none; }
    .visor img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
    .data-box { background: #252c3d; padding: 15px; border-radius: 12px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="top-header-area">
  <header class="header">
    <h1 id="txt-grupo-titulo">Cargando...</h1>
    <div style="display:flex; gap: 10px;">
      <button class="btn-icon" onclick="toggleTheme()">◑</button>
      <button class="btn-icon" onclick="location.reload()">↻</button>
    </div>
  </header>

  <div class="tabs">
    <div id="tab-con" class="tab active" onclick="mostrarTab('con')">CON TERRITORIO</div>
    <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">SIN TERRITORIO</div>
  </div>
</div>

<div class="main-content">
  <div id="seccion-con" class="card">
    <table>
      <thead><tr>
        <th onclick="ordenar('nombre')">Nombre<span class="sort-icon"></span></th>
        <th onclick="ordenar('territorio')">Territorio<span class="sort-icon"></span></th>
        <th onclick="ordenar('tiempo')">Tiempo restante<span class="sort-icon"></span></th>
      </tr></thead>
      <tbody id="body-con"></tbody>
    </table>
  </div>

  <div id="seccion-sin" class="card" style="display:none;">
    <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
  </div>
</div>

<div id="visor" class="visor">
  <button class="btn-icon" style="margin-bottom: 15px;" onclick="cerrarVisor()">✕</button>
  <img id="img-visor">
  <h2 id="nom-visor" style="margin: 20px 0;"></h2>
  <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
  <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
</div>

<script>
  let datos = { con: [], sin: [] };
  let ultimoCampo = "", esAscendente = true;

  async function cargarDatos() {
    const grupo = new URLSearchParams(window.location.search).get('grupo') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    const res = await fetch(`https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec?accion=leerDatosGrupos&hoja=${grupo}`);
    datos = await res.json();
    renderizar();
  }

  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map((item, i) => `<tr onclick='abrirVisor(${i}, "con")'><td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td></tr>`).join('');
    document.getElementById('body-sin').innerHTML = datos.sin.map(item => `<tr><td>${item.nombre}</td></tr>`).join('');
  }

  function ordenar(campo) {
    esAscendente = (ultimoCampo === campo) ? !esAscendente : true;
    ultimoCampo = campo;
    datos.con.sort((a, b) => {
      let vA = a[campo], vB = b[campo];
      if (campo === 'territorio') { vA = parseInt(vA) || 0; vB = parseInt(vB) || 0; }
      if (campo === 'tiempo') {
        const c = (s) => (parseInt(s?.match(/(\d+)\s*mes/i)?.[1]) || 0) * 30 + (parseInt(s?.match(/(\d+)\s*d/i)?.[1]) || 0);
        vA = c(vA); vB = c(vB);
      }
      return esAscendente ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });
    renderizar();
  }

  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }

  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre;
    document.getElementById('img-visor').src = item.img;
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('visor').style.display = 'block';
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? '' : 'light'); }
  
  cargarDatos();
</script>
</body>
</html>
