<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de Grupo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #F5F5F7; --card: #FFFFFF; --text: #1D1D1F; --text-dim: #86868B; --blue: #0066CC; }
    [data-theme='dark'] { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --text-dim: #98989D; --blue: #0A84FF; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: background 0.3s; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-icon { background: #E8E8ED; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text); }
    .tabs { display: flex; background: #E8E8ED; padding: 4px; border-radius: 10px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-radius: 8px; }
    .tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card { background: var(--card); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--text-dim); font-size: 10px; padding: 12px; text-transform: uppercase; cursor: pointer; }
    td { padding: 16px 12px; border-top: 1px solid #E8E8ED; font-size: 14px; }
    .visor { position: fixed; inset: 0; background: var(--bg); padding: 20px; z-index: 100; display: none; overflow-y: auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .data-box { background: var(--card); padding: 15px; border-radius: 10px; }
    .data-box small { color: var(--text-dim); font-size: 10px; display: block; margin-bottom: 4px; text-transform: uppercase; }
  </style>
</head>
<body>

<header class="header">
  <h1 id="txt-grupo-titulo" style="font-size: 20px; margin: 0;">Cargando...</h1>
  <div style="display:flex; gap: 10px;">
    <button class="btn-icon" onclick="toggleTheme()">◑</button>
    <button class="btn-icon" onclick="location.reload()">↻</button>
  </div>
</header>

<div class="tabs">
  <div id="tab-con" class="tab active" onclick="mostrarTab('con')">Con Terr.</div>
  <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">Sin Terr.</div>
</div>

<div id="seccion-con" class="card">
  <table>
    <thead><tr><th onclick="ordenar('nombre')">Nombre ↕</th><th onclick="ordenar('territorio')">Terr. ↕</th><th onclick="ordenar('tiempo')">T. ↕</th></tr></thead>
    <tbody id="body-con"></tbody>
  </table>
</div>

<div id="seccion-sin" class="card" style="display:none;">
  <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
</div>

<div id="visor" class="visor">
  <button class="btn-icon" style="margin-bottom: 20px;" onclick="cerrarVisor()">✕</button>
  <img id="img-visor" style="width:100%; height: 200px; object-fit: cover; border-radius: 12px;">
  <h2 id="nom-visor" style="margin: 20px 0;"></h2>
  <div class="grid">
    <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
    <div class="data-box"><small>Tiempo</small><div id="tiempo-visor"></div></div>
    <div class="data-box"><small>F. Inicio</small><div id="fecha-ini-visor"></div></div>
    <div class="data-box"><small>Últ. Trabajo</small><div id="ult-trab-visor"></div></div>
    <div id="box-grupo" class="data-box" style="display:none; grid-column: span 2;"><small>Estado</small><div id="es-grupo-visor"></div></div>
  </div>
</div>

<script>
  const URL_API = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
  let datos = { con: [], sin: [] };
  let ultimoCampo = "";
  let esAscendente = true;

  function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? '' : 'dark');
  }

 // Cambia la parte final de tu <script> por esto:

 async function cargarDatos() {
    const urlParams = new URLSearchParams(window.location.search);
    const grupo = urlParams.get('hoja') || "GRUPO 1";
    
    // Si no hay hoja en la URL, avisamos
    if (!urlParams.has('hoja')) {
      alert("Por favor, usa un enlace tipo: ?hoja=GRUPO 4");
      return;
    }

    document.getElementById('txt-grupo-titulo').innerText = grupo;

    // CONSTRUCCIÓN AUTOMÁTICA DE LA URL (Esto evita el error de "Acción Inválida")
    const url = new URL(URL_API);
    url.searchParams.append('accion', 'leerDatosGrupos');
    url.searchParams.append('hoja', grupo);
    url.searchParams.append('_t', Date.now());

    try {
      const res = await fetch(url);
      const json = await res.json();
      
      if (json.error) throw new Error(json.mensaje);
      
      renderizar(json);
    } catch(e) { 
      alert("Error al cargar datos: " + e.message); 
    }
  }
  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map((item, i) => `
      <tr onclick='abrirVisor(${i}, "con")'><td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td></tr>`).join('');
    document.getElementById('body-sin').innerHTML = datos.sin.map(item => `<tr><td>${item.nombre}</td></tr>`).join('');
  }

  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre;
    document.getElementById('img-visor').src = item.img;
    document.getElementById('terr-visor').innerText = item.territorio;
    document.getElementById('tiempo-visor').innerText = item.tiempo;
    document.getElementById('fecha-ini-visor').innerText = item.fechaInicio || "-";
    document.getElementById('ult-trab-visor').innerText = item.ultTrabajo || "-";
    const boxGrupo = document.getElementById('box-grupo');
    boxGrupo.style.display = (item.esGrupo && item.esGrupo.toString().toLowerCase() === "si") ? "block" : "none";
    document.getElementById('es-grupo-visor').innerText = "Es del Grupo";
    document.getElementById('visor').style.display = 'block';
  }

  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  cargarDatos();
</script>
</body>
</html>
