<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de Grupo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    :root {
      --font-family: 'Outfit', sans-serif;
      --bg: #0b0f19; --card-bg: #1a202d; --text: #ffffff; 
      --text-dim: #707785; --accent: #3b82f6;
      --top-bg: #ffffff; --top-text: #0b0f19;
    }
    [data-theme='light'] {
      --bg: #ffffff; --card-bg: #f4f4f7; --text: #0b0f19;
      --text-dim: #6e6e73; --accent: #0066cc;
      --top-bg: #0b0f19; --top-text: #ffffff;
    }

    * { box-sizing: border-box; }
    body { font-family: var(--font-family); background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; }

    /* Bloque unificado superior que cubre hasta el borde */
    .top-container { background: var(--top-bg); padding-top: 25px; }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; color: var(--top-text); }
    h1 { font-size: 28px; margin: 0; }
    .btn-icon { background: transparent; border: 1px solid var(--top-text); border-radius: 50%; width: 48px; height: 48px; cursor: pointer; color: var(--top-text); display: flex; align-items: center; justify-content: center; }

    .tabs { display: flex; background: var(--top-bg); color: var(--top-text); border-bottom: 1px solid rgba(0,0,0,0.1); }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; opacity: 0.7; }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); opacity: 1; }

    .main-wrapper { padding: 15px; }
    .card { background: var(--card-bg); border-radius: 16px; overflow-x: auto; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { color: var(--text-dim); padding: 16px; text-transform: uppercase; text-align: left; font-size: 14px; }
    td { padding: 16px; border-top: 1px solid #2d3748; }

    .visor { position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 15px; overflow-y: auto; display: none; }
    .data-box { background: #252c3d; padding: 15px; border-radius: 12px; margin-top: 10px; color: var(--text); }
    .visor img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
  </style>
</head>
<body>

<div class="top-container">
  <header class="header">
    <h1 id="txt-grupo-titulo">Cargando...</h1>
    <div style="display:flex; gap: 10px;">
      <button class="btn-icon" onclick="toggleTheme()">◑</button>
      <button class="btn-icon" onclick="location.reload()">↻</button>
    </div>
  </header>
  <div class="tabs">
    <div id="tab-con" class="tab active" onclick="mostrarTab('con')">CON TERRITORIO</div>
    <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">SIN TERRITORIO</div>
  </div>
</div>

<div class="main-wrapper">
  <div id="seccion-con" class="card">
    <table><thead><tr><th>Nombre</th><th>Territorio</th><th>Tiempo</th></tr></thead><tbody id="body-con"></tbody></table>
  </div>
  <div id="seccion-sin" class="card" style="display:none;">
    <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
  </div>
</div>

<div id="visor" class="visor">
  <button class="btn-icon" style="margin-bottom: 15px;" onclick="cerrarVisor()">✕</button>
  <img id="img-visor">
  <h2 id="nom-visor" style="margin: 20px 0;"></h2>
  <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
  <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
  <div class="data-box"><small>F. Inicio</small><div id="fini-visor"></div></div>
  <div class="data-box"><small>Últ. vez trabajado</small><div id="ult-visor"></div></div>
  <div class="data-box"><small>Estado</small><div id="est-visor"></div></div>
</div>

<script>
  let datos = { con: [], sin: [] };
  async function cargarDatos() {
    const grupo = new URLSearchParams(window.location.search).get('grupo') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    const res = await fetch(`https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec?accion=leerDatosGrupos&hoja=${grupo}`);
    datos = await res.json();
    renderizar();
  }
  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map((item, i) => `<tr onclick='abrirVisor(${i}, "con")'><td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td></tr>`).join('');
    document.getElementById('body-sin').innerHTML = datos.sin.map(item => `<tr><td>${item.nombre}</td></tr>`).join('');
  }
  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre;
    document.getElementById('img-visor').src = item.img;
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('fini-visor').innerText = item.finicio || "-";
    document.getElementById('ult-visor').innerText = item.ultrabajo || "-";
    document.getElementById('est-visor').innerText = item.estado || "-";
    document.getElementById('visor').style.display = 'block';
  }
  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? '' : 'light'); }
  cargarDatos();
</script>
</body>
</html>
