<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gestión de Grupo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

    :root {
      --bg-color: #0b0f19;
      --card-bg: #1a202d;
      --text-main: #ffffff;
      --text-dim: #707785;
      --accent: #3b82f6;
      --header-bg: #ffffff;
      --header-text: #0b0f19;
      --border-table: #2d3748;
      --font-family: 'Outfit', sans-serif;
      --size-header: 30px;
      --weight-header: 800;
      --size-tabs: 18px;
      --weight-tabs: 600;
      --size-table: 16px;
      --weight-table: 400;
      --radius-card: 16px;
      --pad-header-top: 15px;
      --pad-tabs: 14px;
    }

    /* --- TEMA CLARO --- */
    [data-theme='light'] {
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-main: #0b0f19;
      --text-dim: #555c6b;
      --border-table: #e2e8f0;
      --header-bg: #ffffff;
      --header-text: #0b0f19;
    }

       /* --- TEMA CLARO: BOTONES --- */
    [data-theme='light'] .btn-icon, 
    [data-theme='light'] .btn-cerrar {
        background: #ced4da !important; /* Gris claro (más oscuro que el blanco, más claro que el negro) */
        color: #0b0f19 !important;      /* Texto oscuro */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
    }


    /* --- ESTRUCTURA --- */
    html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); font-family: var(--font-family); }
    .app-wrapper { min-height: 100dvh; display: flex; flex-direction: column; }
    
    [data-theme='light'] body, [data-theme='light'] .app-wrapper { background-color: var(--bg-color); }

    .top-header-area { background-color: var(--header-bg); color: var(--header-text); padding: var(--pad-header-top) 15px 0 15px; position: sticky; top: 0; z-index: 10; }
    .main-content { padding: 10px 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card { background: var(--card-bg); border-radius: var(--radius-card); color: var(--text-main); padding: 15px; flex-grow: 1; overflow-y: auto; }

    /* --- CABECERA Y TABS --- */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    #txt-grupo-titulo { font-size: var(--size-header); font-weight: var(--weight-header); margin: 0; }
    
    .btn-icon { background: var(--card-bg); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); }

    .tabs { display: flex; margin-top: 5px; }
    .tab { flex: 1; padding: var(--pad-tabs); text-align: center; color: var(--header-text); cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7; font-size: var(--size-tabs); font-weight: var(--weight-tabs); }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); opacity: 1; }
    
    /* --- TABLA --- */
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 14px; border-bottom: 1px solid var(--border-table); text-align: left; font-size: var(--size-table); }
    th { cursor: pointer; }
    thead tr th { text-transform: uppercase; font-weight: 800; }
    #body-con td:nth-child(2), #body-con td:nth-child(3), thead tr th:nth-child(2), thead tr th:nth-child(3), #body-sin td, #seccion-sin thead th { text-align: center; }
    
    /* --- VISOR --- */
    .visor { position: fixed; inset: 0; background: var(--bg-color); z-index: 100; padding: 20px; display: none; color: var(--text-main); overflow-y: auto; }
    .btn-cerrar { background: var(--card-bg); border: none; border-radius: 50%; width: 56px; height: 56px; cursor: pointer; color: var(--text-main); font-size: 24px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
    #img-visor { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; margin-top: 20px; }
    .data-box { background: #252c3d; padding: 15px; border-radius: 12px; margin-top: 10px; }
    .visor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #box-grupo { grid-column: span 2; }
</style>

</head>
<body>

<div class="app-wrapper">
  <div class="top-header-area">
    <header class="header">
      <h1 id="txt-grupo-titulo">Cargando...</h1>
      <div style="display:flex; gap: 10px;">
        <button class="btn-icon" onclick="toggleTheme()">◑</button>
        <button class="btn-icon" onclick="location.reload()">↻</button>
      </div>
    </header>
    <div class="tabs">
      <div id="tab-con" class="tab active" onclick="mostrarTab('con')">CON TERRITORIO</div>
      <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">SIN TERRITORIO</div>
    </div>
  </div>

  <div class="main-content">
    <div id="seccion-con" class="card">
      <table>
        <thead><tr>
          <th onclick="ordenar('nombre')">Nombre</th>
          <th onclick="ordenar('territorio')">Territorio</th>
          <th onclick="ordenar('tiempo')">Tiempo restante</th>
        </tr></thead>
        <tbody id="body-con"></tbody>
      </table>
    </div>
    <div id="seccion-sin" class="card" style="display:none;">
      <table><thead><tr><th style="text-align:center;">Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
    </div>
  </div>
</div>

<div id="visor" class="visor">
  <button class="btn-cerrar" onclick="cerrarVisor()">✕</button>
  <h2 id="nom-visor"></h2>
  <img id="img-visor" src="" alt="Mapa">
  <div class="visor-grid">
      <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
      <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
      <div class="data-box"><small>Fecha inicio</small><div id="fecha-ini-visor"></div></div>
      <div class="data-box"><small>Última vez trabajado</small><div id="ult-trab-visor"></div></div>
      <div id="box-grupo" class="data-box" style="display:none;">
        <small>Estado</small><div id="es-grupo-visor"></div>
      </div>
  </div>
</div>

<script>
  let datos = { con: [], sin: [] };
  let ultimoCampo = "", esAscendente = true;

  async function cargarDatos() {
    const grupo = new URLSearchParams(window.location.search).get('grupo') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec?accion=leerDatosGrupos&hoja=${grupo}`);
      datos = await res.json();
      ordenar('tiempo');
    } catch (e) { console.error(e); }
  }

  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map((item, i) => `<tr onclick='abrirVisor(${i}, "con")'><td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td></tr>`).join('');
    document.getElementById('body-sin').innerHTML = datos.sin.map((item, i) => `<tr onclick='abrirVisor(${i}, "sin")'><td>${item.nombre}</td></tr>`).join('');
  }

  function ordenar(campo) {
    esAscendente = (ultimoCampo === campo) ? !esAscendente : true;
    ultimoCampo = campo;
    datos.con.sort((a, b) => {
      let vA = a[campo] || "", vB = b[campo] || "";
      if (campo === 'tiempo') {
        const c = (s) => (parseInt(s?.match(/(\d+)\s*mes/i)?.[1]) || 0) * 30 + (parseInt(s?.match(/(\d+)\s*d/i)?.[1]) || 0);
        vA = c(vA); vB = c(vB);
      }
      return esAscendente ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });
    renderizar();
  }

  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre || "-";
    document.getElementById('img-visor').src = item.img || "https://via.placeholder.com/400x250?text=Sin+Mapa";
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('fecha-ini-visor').innerText = formatearFecha(item.fechaInicio);
    document.getElementById('ult-trab-visor').innerText = formatearFecha(item.ultTrabajo);
    document.getElementById('box-grupo').style.display = item.esGrupo ? "block" : "none";
    if (item.esGrupo) document.getElementById('es-grupo-visor').innerText = item.esGrupo;
    document.getElementById('visor').style.display = 'block';
  }

  function formatearFecha(f) { return !f ? "-" : new Date(f).toLocaleDateString('es-ES'); }
  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? '' : 'light'); }
  
  cargarDatos();
</script>
</body>
</html>
