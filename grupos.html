<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Grupo</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilo exacto de la imagen */
    .tabla-apple { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .tabla-apple th { text-align: left; padding: 10px; color: var(--texto-secundario); font-size: 0.8em; }
    .tabla-apple td { padding: 15px 10px; border-bottom: 1px solid var(--glass-borde); }
    .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .caja-dato { background: var(--glass-fondo); padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="contenedor-app">
  <header class="cabecera-apple">
    <h1 id="txt-grupo-titulo">Grupo 1</h1>
    <button onclick="alternarTema()">🌓</button>
  </header>

  <div class="contenedor-tabs">
    <button id="btn-con" class="tab-btn activo" onclick="mostrarTab('con')">CON TERRITORIO</button>
    <button id="btn-sin" class="tab-btn" onclick="mostrarTab('sin')">SIN TERRITORIO</button>
  </div>

  <div id="seccion-con">
    <table class="tabla-apple">
      <thead>
        <tr>
          <th onclick="ordenar('nombre')">Nombre ↕</th>
          <th onclick="ordenar('territorio')">Nº Terr. ↕</th>
          <th onclick="ordenar('tiempo')">T. Restante ↕</th>
        </tr>
      </thead>
      <tbody id="body-con"></tbody>
    </table>
  </div>

  <div id="seccion-sin" style="display:none;">
    <table class="tabla-apple">
      <thead><tr><th>Hermanos sin Territorio</th></tr></thead>
      <tbody id="body-sin"></tbody>
    </table>
  </div>
</div>

<div id="visor" class="visor-pantalla-completa" style="display:none;">
  <div class="cabecera-visor-completo">
    <span>Ficha Detallada</span>
    <button onclick="cerrarVisor()">✕</button>
  </div>
  <div class="zona-scroll-zoom" style="padding:20px;">
    <img id="img-visor" style="width:100%; border-radius:12px;">
    <h2 id="nom-visor" style="margin:20px 0;"></h2>
    <div class="ficha-grid">
      <div class="caja-dato"><small>Territorio</small><div id="terr-visor"></div></div>
      <div class="caja-dato"><small>Tiempo</small><div id="tiempo-visor"></div></div>
    </div>
  </div>
</div>

<script>
  const URL_API = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec"; // RELLENA ESTO
  let datos = { con: [], sin: [] };

  async function cargarDatos() {
    const params = new URLSearchParams(window.location.search);
    const grupo = params.get("grupo") || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    
    const res = await fetch(`${URL_API}?accion=leerDatosGrupos&hoja=${grupo}`);
    datos = await res.json();
    renderizar();
  }

  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map(item => `
      <tr onclick="abrirVisor('${item.nombre}', '${item.img}', '${item.territorio}', '${item.tiempo}')">
        <td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td>
      </tr>`).join('');
    
    document.getElementById('body-sin').innerHTML = datos.sin.map(item => `
      <tr><td>${item.nombre}</td></tr>`).join('');
  }

// Asegúrate de que estas variables estén fuera de la función
let ultimoCampo = "";
let esAscendente = true;

function ordenar(campo) {
  // 1. Lógica de cambio de sentido
  if (ultimoCampo === campo) {
    esAscendente = !esAscendente;
  } else {
    esAscendente = true; // Siempre empezamos en ascendente al cambiar de columna
    ultimoCampo = campo;
  }

  // 2. Ejecutar el ordenamiento
  datos.con.sort((a, b) => {
    let valA, valB;

    if (campo === 'nombre') {
      valA = a.nombre.toLowerCase();
      valB = b.nombre.toLowerCase();
      return esAscendente ? valA.localeCompare(valB) : valB.localeCompare(valA);
    } 
    
    if (campo === 'territorio') {
      valA = parseInt(a.territorio) || 0;
      valB = parseInt(b.territorio) || 0;
    } 
    
    if (campo === 'tiempo') {
      const calcularDias = (str) => {
        const meses = parseInt(str.match(/(\d+)\s*mes/i)?.[1]) || 0;
        const dias = parseInt(str.match(/(\d+)\s*d/i)?.[1]) || 0;
        return (meses * 30) + dias;
      };
      valA = calcularDias(a.tiempo);
      valB = calcularDias(b.tiempo);
    }

    // 3. Aplicar orden para números (Territorio y Tiempo)
    if (esAscendente) {
      return valA - valB;
    } else {
      return valB - valA;
    }
  });

  renderizar();
}
  
  function abrirVisor(nom, img, terr, tiempo) {
    document.getElementById('nom-visor').innerText = nom;
    document.getElementById('img-visor').src = img;
    document.getElementById('terr-visor').innerText = terr;
    document.getElementById('tiempo-visor').innerText = tiempo;
    document.getElementById('visor').style.display = 'block';
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
  }
  function alternarTema() { document.documentElement.dataset.theme = (document.documentElement.dataset.theme === 'oscuro') ? 'claro' : 'oscuro'; }

  cargarDatos();
</script>
</body>
</html>
