<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gestión de Grupo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

    :root {
      --bg-color: #0b0f19;
      --card-bg: #1a202d;
      --text-main: #ffffff;
      --text-dim: #707785;
      --accent: #3b82f6;
      --header-bg: #ffffff;
      --header-text: #0b0f19;
      --border-table: #2d3748;
      --radius-card: 16px;
    }

    [data-theme='light'] {
        --bg-color: #cbd5e1; /* Gris un poco más oscuro solicitado */
        --card-bg: #ffffff;          
        --text-main: #0b0f19;        
        --text-dim: #555c6b;         
        --border-table: #e2e8f0;     
    }

    html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Outfit', sans-serif; }
    .app-wrapper { min-height: 100dvh; display: flex; flex-direction: column; }

    .top-header-area { background-color: var(--header-bg); color: var(--header-text); padding: 15px 15px 0 15px; position: sticky; top: 0; z-index: 10; }
    .main-content { padding: 10px 15px 0 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card { background: var(--card-bg); border-radius: var(--radius-card); color: var(--text-main); padding: 15px; overflow-y: auto; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    #txt-grupo-titulo { font-size: 30px; font-weight: 800; margin: 0; }
    
    .btn-icon, .btn-cerrar { 
      background: var(--card-bg); border: none; border-radius: 50%; cursor: pointer; color: var(--text-main);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-icon { width: 45px; height: 45px; font-size: 20px; }
    .btn-cerrar { width: 56px; height: 56px; font-size: 24px; position: sticky; top: 0; float: right; z-index: 101; }

    .tabs { display: flex; margin-top: 5px; }
    .tab { flex: 1; padding: 14px; text-align: center; color: var(--header-text); cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7; font-weight: 600; }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); opacity: 1; }
    
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 14px; border-bottom: 1px solid var(--border-table); text-align: left; }

    /* --- VISOR --- */
    .visor { position: fixed; inset: 0; background: var(--bg-color); z-index: 100; padding: 20px; display: none; color: var(--text-main); overflow-y: auto; }
    #img-visor { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; margin: 15px 0; }
    
    .visor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .data-box { background: var(--card-bg); border: 1px solid var(--border-table); padding: 15px; border-radius: 12px; margin-top: 10px; }
    .visor-grid .data-box { margin-top: 0; }
</style>
</head>
<body>

<div class="app-wrapper">
  <div class="top-header-area">
    <header class="header">
      <h1 id="txt-grupo-titulo">Cargando...</h1>
      <div style="display:flex; gap: 10px;">
        <button class="btn-icon" onclick="toggleTheme()">◑</button>
        <button class="btn-icon" onclick="location.reload()">↻</button>
      </div>
    </header>
    <div class="tabs">
      <div id="tab-con" class="tab active" onclick="mostrarTab('con')">CON TERRITORIO</div>
      <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">SIN TERRITORIO</div>
    </div>
  </div>

  <div class="main-content">
    <div id="seccion-con" class="card">
      <table>
        <thead><tr><th>Nombre</th><th>Territorio</th><th>Tiempo</th></tr></thead>
        <tbody id="body-con"></tbody>
      </table>
    </div>
    <div id="seccion-sin" class="card" style="display:none;">
      <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
    </div>
  </div>
</div>

<div id="visor" class="visor">
  <button class="btn-cerrar" onclick="cerrarVisor()">✕</button>
  <h2 id="nom-visor"></h2>
  <img id="img-visor" src="" alt="Mapa">
  
  <div class="visor-grid">
      <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
      <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
      <div class="data-box"><small>Fecha inicio</small><div id="fecha-ini-visor"></div></div>
      <div class="data-box"><small>Último trabajo</small><div id="ult-trab-visor"></div></div>
  </div>
  <div id="box-grupo" class="data-box" style="display:none;">
    <small>Estado</small><div id="es-grupo-visor"></div>
  </div>
</div>

<script>
  let datos = { con: [], sin: [] };
  async function cargarDatos() {
    const grupo = new URLSearchParams(window.location.search).get('grupo') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec?accion=leerDatosGrupos&hoja=${grupo}`);
      datos = await res.json();
      renderizar();
    } catch (e) { console.error(e); }
  }

  function renderizar() {
    document.getElementById('body-con').innerHTML = datos.con.map((item, i) => `<tr onclick='abrirVisor(${i}, "con")'><td>${item.nombre}</td><td>${item.territorio}</td><td>${item.tiempo}</td></tr>`).join('');
    document.getElementById('body-sin').innerHTML = datos.sin.map((item, i) => `<tr onclick='abrirVisor(${i}, "sin")'><td>${item.nombre}</td></tr>`).join('');
  }

  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre || "-";
    document.getElementById('img-visor').src = item.img || "https://via.placeholder.com/400x250?text=Sin+Mapa";
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('fecha-ini-visor').innerText = item.fechaInicio ? new Date(item.fechaInicio).toLocaleDateString('es-ES') : "-";
    document.getElementById('ult-trab-visor').innerText = item.ultTrabajo ? new Date(item.ultTrabajo).toLocaleDateString('es-ES') : "-";
    document.getElementById('box-grupo').style.display = item.esGrupo ? "block" : "none";
    document.getElementById('visor').style.display = 'block';
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? '' : 'light'); }
  
  cargarDatos();
</script>
</body>
</html>
