<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de Grupo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

  :root { 
    --bg: #0b0f19; --card-bg: #1a202d; --text: #ffffff; 
    --text-dim: #707785; --accent: #3b82f6; 
  }
  
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }

  /* Corregido: Mantenemos el display del visor para que el JS lo maneje */
  .visor { position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 20px; overflow-y: auto; display: none; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  h1 { font-size: 28px; font-weight: 700; margin: 0; }
  
  .btn-icon { background: var(--card-bg); border: 1px solid #2d3748; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; padding: 0; }
  /* Iconos grandes dentro de los botones */
  .btn-icon svg { width: 28px; height: 28px; }

  .tabs { display: flex; background: #0b0f19; border-bottom: 1px solid #2d3748; margin-bottom: 20px; }
  .tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { color: var(--text-dim); font-size: 11px; padding: 16px; text-transform: uppercase; cursor: pointer; text-align: left; }
  td { padding: 16px; border-top: 1px solid #2d3748; font-size: 14px; cursor: pointer; }

  /* Flechas minimalistas (usando CSS sin emoticonos) */
  .sort-icon { display: inline-block; width: 6px; height: 6px; border-right: 1px solid #fff; border-bottom: 1px solid #fff; transform: rotate(45deg); margin-left: 8px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
  .data-box { background: #252c3d; padding: 15px; border-radius: 12px; }
  .data-box small { color: var(--text-dim); font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; }
</style>



</head>
<body>

<header class="header">
  <h1 id="txt-grupo-titulo" style="font-size: 30px; margin: 0;">Cargando...</h1>
  <div style="display:flex; gap: 10px;">
    <button class="btn-icon" onclick="toggleTheme()">◑</button>
    <button class="btn-icon" onclick="location.reload()">↻</button>
  </div>
</header>

<div class="tabs">
  <div id="tab-con" class="tab active" onclick="mostrarTab('con')">Con Territorio</div>
  <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">Sin Territorio</div>
</div>

<div id="seccion-con" class="card">
  <table>
    <thead><tr><th onclick="ordenar('nombre')">Nombre ↕</th><th onclick="ordenar('territorio')">Territorio ↕</th><th onclick="ordenar('tiempo')">Tiempo restante↕</th></tr></thead>
    <tbody id="body-con"></tbody>
  </table>
</div>

<div id="seccion-sin" class="card" style="display:none;">
  <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
</div>

<div id="visor" class="visor">
  <button class="btn-icon" style="margin-bottom: 20px;" onclick="cerrarVisor()">✕</button>
  <img id="img-visor" style="width:100%; height: 200px; object-fit: cover; border-radius: 12px;">
  <h2 id="nom-visor" style="margin: 20px 0;"></h2>
  <div class="grid">
    <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
    <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
    <div class="data-box"><small>F. Inicio</small><div id="fecha-ini-visor"></div></div>
    <div class="data-box"><small>Últ. vez trabajado</small><div id="ult-trab-visor"></div></div>
    <div id="box-grupo" class="data-box" style="display:none; grid-column: span 2;"><small>Estado</small><div id="es-grupo-visor"></div></div>
  </div>
</div>

<script>
  const URL_API = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
  
  // Aseguramos que 'datos' sea una propiedad del objeto global window
  window.datos = { con: [], sin: [] };
  let ultimoCampo = "";
  let esAscendente = true;

  async function cargarDatos() {
    const params = new URLSearchParams(window.location.search);
    const grupo = params.get('grupo') || params.get('hoja') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;

    try {
      const url = `${URL_API}?accion=leerDatosGrupos&hoja=${encodeURIComponent(grupo)}&_t=${Date.now()}`;
      const res = await fetch(url);
      // Guardamos directamente en window.datos
      window.datos = await res.json();
      renderizar();
    } catch(e) { alert("Error al cargar: " + e.message); }
  }

  function renderizar() {
    const bodyCon = document.getElementById('body-con');
    const bodySin = document.getElementById('body-sin');
    if (!bodyCon || !bodySin) return;

    bodyCon.innerHTML = window.datos.con.map((item, i) => `
      <tr onclick='abrirVisor(${i}, "con")'>
        <td>${item.nombre || ""}</td>
        <td>${item.territorio || ""}</td>
        <td>${item.tiempo || ""}</td>
      </tr>`).join('');

    bodySin.innerHTML = window.datos.sin.map(item => `
      <tr><td>${item.nombre || ""}</td></tr>`).join('');
  }

  function ordenar(campo) {
    if (ultimoCampo === campo) {
      esAscendente = !esAscendente;
    } else {
      esAscendente = true;
      ultimoCampo = campo;
    }

    // Accedemos a window.datos explícitamente
    window.datos.con.sort((a, b) => {
      let valA, valB;
      if (campo === 'nombre') {
        valA = (a.nombre || "").toLowerCase();
        valB = (b.nombre || "").toLowerCase();
        return esAscendente ? valA.localeCompare(valB) : valB.localeCompare(valA);
      } 
      if (campo === 'territorio') {
        valA = parseInt(a.territorio) || 0;
        valB = parseInt(b.territorio) || 0;
      } 
      if (campo === 'tiempo') {
        const calcularDias = (str) => {
          const meses = parseInt(str?.match(/(\d+)\s*mes/i)?.[1]) || 0;
          const dias = parseInt(str?.match(/(\d+)\s*d/i)?.[1]) || 0;
          return (meses * 30) + dias;
        };
        valA = calcularDias(a.tiempo);
        valB = calcularDias(b.tiempo);
      }
      return esAscendente ? valA - valB : valB - valA;
    });
    renderizar();
  }

  function abrirVisor(i, tipo) {
    const item = window.datos[tipo][i];
    if (!item) return;
    
    document.getElementById('nom-visor').innerText = item.nombre || "";
    document.getElementById('img-visor').src = item.img || "";
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('fecha-ini-visor').innerText = formatearFecha(item.fechaInicio);
    document.getElementById('ult-trab-visor').innerText = formatearFecha(item.ultTrabajo);
    
    // AQUÍ ESTÁ EL CAMBIO PARA EL CAMPO ESGRUPO
    const boxGrupo = document.getElementById('box-grupo');
    const esGrupoDiv = document.getElementById('es-grupo-visor');
    
    if (item.esGrupo && item.esGrupo.toString().trim() !== "") {
      boxGrupo.style.display = "block"; // Lo mostramos
      esGrupoDiv.innerText = item.esGrupo; // Ponemos el texto (ej: "GRUPO")
    } else {
      boxGrupo.style.display = "none"; // Lo ocultamos si está vacío
    }
    
    document.getElementById('visor').style.display = 'block';
  }

  function formatearFecha(iso) {
    if (!iso || iso === "-") return "-";
    const d = new Date(iso);
    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? '' : 'dark'); }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }

  window.addEventListener('load', cargarDatos);
</script>
</body>
</html>
