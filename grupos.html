<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gestión de Grupo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

    :root {
      /* --- COLORES --- */
      --bg-color: #0b0f19;          /* Fondo página */
      --card-bg: #1a202d;          /* Fondo panel tabla */
      --text-main: #ffffff;        /* Texto general */
      --text-dim: #707785;         /* Texto secundario */
      --accent: #3b82f6;           /* Pestañas activas/acentos */
      --header-bg: #ffffff;        /* Fondo cabecera */
      --header-text: #0b0f19;      /* Texto cabecera */
      --border-table: #2d3748;     /* Líneas tabla */

      /* --- FUENTES (Tamaños y Grosores) --- */
      --font-family: 'Outfit', sans-serif;
      --size-header: 30px;       /* Tamaño título "GRUPO X" */
      --weight-header: 800;        /* Grosor título */
      --size-tabs: 18px;         /* Tamaño pestañas */
      --weight-tabs: 600;          /* Grosor pestañas */
      --size-table: 16px;          /* Tamaño tabla */
      --weight-table: 400;         /* Grosor tabla */
      
      /* --- AJUSTES DE TABLA --- */

/* 1. Cabecera en mayúsculas y negrita */
thead tr th {
    text-transform: uppercase;
    font-weight: 800; /* Asegura negrita fuerte */
}

/* 2. Alinear columnas específicas: 
   - Columna 2 (Territorio) y Columna 3 (Tiempo restante) centradas */
#body-con td:nth-child(2), 
#body-con td:nth-child(3),
thead tr th:nth-child(2),
thead tr th:nth-child(3) {
    text-align: center;
}

/* 3. Tabla "Sin Territorio" centrada */
#body-sin td {
    text-align: center;
}

/* Opcional: Centrar también el encabezado de la tabla "Sin Territorio" */
#seccion-sin thead th {
    text-align: center;
}

      /* --- TEMA CLARO --- */


[data-theme='light'] {
    /* Sobrescribimos todas las variables para el modo claro */
    --bg-color: #e2e8f0;          
    --card-bg: #ffffff;          
    --text-main: #0b0f19;        
    --text-dim: #555c6b;         
    --border-table: #e2e8f0;     
    --header-bg: #ffffff;        
    --header-text: #0b0f19;
}

/* Forzamos que el body y el contenedor usen la variable de fondo */
[data-theme='light'] body {
    background-color: var(--bg-color);
}

[data-theme='light'] .app-wrapper {
    background-color: var(--bg-color);
}

/* Ajuste para que los textos en las tarjetas no se pierdan */
[data-theme='light'] .card {
    color: var(--text-main);
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Sombra suave para separar del fondo */
}


      /* --- BORDES Y SOMBRAS --- */
      --radius-card: 16px;         /* Redondeo panel */
      
      /* --- ESPACIADOS --- */
      --pad-header-top: 15px;      /* Espacio superior cabecera */
      --pad-tabs: 14px;            /* Padding interno pestañas */
    }

    /* --- ESTRUCTURA --- */
    html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); font-family: var(--font-family); }
    .app-wrapper { min-height: 100dvh; display: flex; flex-direction: column; background-color: transparent; }

    .top-header-area { 
      background-color: var(--header-bg); 
      color: var(--header-text); 
      padding: var(--pad-header-top) 15px 0 15px; 
      position: sticky; top: 0; z-index: 10;
    
    }

    .main-content { 
      padding: 10px 15px 0 15px; 
      flex-grow: 1; 
      display: flex; 
      flex-direction: column;
      background-color: transparent; 
      padding-bottom: calc(15px + env(safe-area-inset-bottom, 20px));
    }
    
    .card { 
      background: var(--card-bg); 
      border-radius: var(--radius-card); 
      color: var(--text-main); 
      padding: 10px; 
      flex-grow: 1; 
      overflow-y: auto;
    }

    /* --- CABECERA Y TABS --- */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    #txt-grupo-titulo { font-size: var(--size-header); font-weight: var(--weight-header); margin: 0; }
    
    /* 1. Modifica el estilo base de .btn-icon */
.btn-icon { 
  background: var(--card-bg); /* Fondo de la tarjeta en lugar de transparente */
  border: none;               /* Quitamos el borde definido */
  border-radius: 50%; 
  width: 45px; 
  height: 45px; 
  cursor: pointer; 
  color: var(--text-main);    /* Color basado en el tema */
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 20px; 
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* Sombra para efecto flotante */
  transition: transform 0.2s, box-shadow 0.2s; /* Animación al presionar */
}

/* Efecto al presionar el botón */
.btn-icon:active {
  transform: scale(0.95);
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

/* 2. Modifica el estilo de .btn-cerrar */
.btn-cerrar { 
  position: sticky; 
  top: 0; 
  float: right; 
  background: var(--card-bg); 
  border: none; 
  border-radius: 50%; 
  width: 56px; 
  height: 56px; 
  cursor: pointer; 
  color: var(--text-main); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 24px; 
  z-index: 101; 
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4); /* Sombra más pronunciada */
}

    
    .tabs { display: flex; margin-top: 5px; }
    .tab { flex: 1; padding: var(--pad-tabs); text-align: center; color: var(--header-text); cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7; font-size: var(--size-tabs); font-weight: var(--weight-tabs); }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); opacity: 1; }
    
    /* --- TABLA --- */
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 14px; border-bottom: 1px solid var(--border-table); cursor: pointer; text-align: left; font-size: var(--size-table); font-weight: var(--weight-table); }
    .sort-icon { display: inline-block; width: 6px; height: 6px; border-right: 1.5px solid var(--text-dim); border-bottom: 1.5px solid var(--text-dim); transform: rotate(45deg); margin-left: 8px; }
    
    /* --- VISOR --- */
   /* --- VISOR - CORREGIDO --- */
.visor { 
    position: fixed; 
    inset: 0; 
    background: var(--bg-color); /* Esto ya está bien, usará el blanco en modo claro */
    z-index: 100; 
    padding: 20px; 
    display: none; 
    color: var(--text-main);    /* Esto cambiará a negro en modo claro */
    overflow-y: auto; 
}

/* --- DATA-BOX - CORREGIDO --- */
.data-box { 
    /* Cambiamos el color fijo #252c3d por una variable */
    background: var(--card-bg); 
    /* Añadimos un pequeño borde o sombra para que resalte en modo claro */
    border: 1px solid var(--border-table);
    padding: 15px; 
    border-radius: 12px; 
    margin-top: 10px; 
}

    #img-visor { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; margin-top: 20px; }
    /* Nuevo contenedor para los datos del visor */
.datos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
    gap: 10px;                     /* Espacio entre los bloques */
    margin-top: 15px;
}

/* Ajuste para que los elementos dentro de la grid no tengan margen superior extra */
.datos-grid .data-box {
    margin-top: 0;
}
/* Estilos para las etiquetas de tiempo */
.badge {
    padding: 4px 10px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    display: inline-block;
}

.bg-caducado { background-color: #ef4444; } /* Rojo */
.bg-menos-mes { background-color: #f97316; } /* Naranja */
.bg-mas-mes { background-color: #22c55e; }   /* Verde */
/* 4. Estilo para la columna Territorio (Columna 2) */

/* Estilos para el territorio según el valor */
.terr-alto {
    font-weight: 800;
    font-size: 18px;
    color: #3b82f6; /* Azul */
}

.terr-bajo {
    font-weight: 800;
    font-size: 18px;
    color: var(--text-main); /* Blanco (o color de texto principal) */
}
/* Estilos para las etiquetas de tiempo */
.badge {
    padding: 4px 10px;
    border-radius: 12px;
    color: white;
    font-weight: 700; /* Añadimos esto para la negrita */
    font-size: 14px;
    display: inline-block;
}

</style>

</head>
<body>

<div class="app-wrapper">
  <div class="top-header-area">
    <header class="header">
      <h1 id="txt-grupo-titulo">Cargando...</h1>
      <div style="display:flex; gap: 10px;">
        <button class="btn-icon" onclick="toggleTheme()">◑</button>
        <button class="btn-icon" onclick="location.reload()">↻</button>
      </div>
    </header>
    <div class="tabs">
      <div id="tab-con" class="tab active" onclick="mostrarTab('con')">CON TERRITORIO</div>
      <div id="tab-sin" class="tab" onclick="mostrarTab('sin')">SIN TERRITORIO</div>
    </div>
  </div>

  <div class="main-content">
    <div id="seccion-con" class="card">
      <table>
        <thead><tr>
          <th onclick="ordenar('nombre')">Nombre<span class="sort-icon"></span></th>
          <th onclick="ordenar('territorio')">Territorio<span class="sort-icon"></span></th>
          <th onclick="ordenar('tiempo')">Tiempo restante<span class="sort-icon"></span></th>
        </tr></thead>
        <tbody id="body-con"></tbody>
      </table>
    </div>
    <div id="seccion-sin" class="card" style="display:none;">
      <table><thead><tr><th>Nombre</th></tr></thead><tbody id="body-sin"></tbody></table>
    </div>
  </div>
</div>

<div id="visor" class="visor">
  <button class="btn-cerrar" onclick="cerrarVisor()">✕</button>
  <h2 id="nom-visor"></h2>
  <img id="img-visor" src="" alt="Mapa">
  
  <div class="datos-grid">
      <div class="data-box"><small>Territorio</small><div id="terr-visor"></div></div>
      <div class="data-box"><small>Tiempo restante</small><div id="tiempo-visor"></div></div>
      <div class="data-box"><small>Fecha inicio</small><div id="fecha-ini-visor"></div></div>
      <div class="data-box"><small>Último trabajo</small><div id="ult-trab-visor"></div></div>
  </div>

  <div id="box-grupo" class="data-box" style="display:none; margin-top: 10px;">
    <small>Estado</small><div id="es-grupo-visor"></div>
  </div>
</div>


<script>
  // ... (código JavaScript sin cambios) ...
  let datos = { con: [], sin: [] };
  let ultimoCampo = "", esAscendente = true;

  async function cargarDatos() {
    const grupo = new URLSearchParams(window.location.search).get('grupo') || "GRUPO 1";
    document.getElementById('txt-grupo-titulo').innerText = grupo;
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec?accion=leerDatosGrupos&hoja=${grupo}`);
      datos = await res.json();
      ordenar('tiempo');
      renderizar();
    } catch (e) { console.error(e); }
  }

  function renderizar() {
  document.getElementById('body-con').innerHTML = datos.con.map((item, i) => {
    // Lógica para etiquetas de tiempo (mantenemos lo anterior)
    let claseTiempo = "";
    if (item.tiempo.toLowerCase().includes("caducado")) {
      claseTiempo = "bg-caducado";
    } else if (item.tiempo.toLowerCase().includes("mes") || item.tiempo.toLowerCase().includes("d")) {
      const meses = parseInt(item.tiempo.match(/(\d+)\s*mes/i)?.[1]) || 0;
      claseTiempo = (meses < 1) ? "bg-menos-mes" : "bg-mas-mes";
    }

    // Lógica para el color del Territorio
    const valorTerritorio = parseInt(item.territorio) || 0;
    const claseTerritorio = valorTerritorio > 500 ? "terr-alto" : "terr-bajo";

    return `<tr onclick='abrirVisor(${i}, "con")'>
              <td>${item.nombre}</td>
              <td class="${claseTerritorio}">${item.territorio}</td>
              <td><span class="badge ${claseTiempo}">${item.tiempo}</span></td>
            </tr>`;
  }).join('');

  document.getElementById('body-sin').innerHTML = datos.sin.map((item, i) => `<tr onclick='abrirVisor(${i}, "sin")'><td>${item.nombre}</td></tr>`).join('');
}



  function ordenar(campo) {
    esAscendente = (ultimoCampo === campo) ? !esAscendente : true;
    ultimoCampo = campo;
    datos.con.sort((a, b) => {
      let vA = a[campo] || "", vB = b[campo] || "";
      if (campo === 'tiempo') {
        const c = (s) => (parseInt(s?.match(/(\d+)\s*mes/i)?.[1]) || 0) * 30 + (parseInt(s?.match(/(\d+)\s*d/i)?.[1]) || 0);
        vA = c(vA); vB = c(vB);
      }
      return esAscendente ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });
    renderizar();
  }

  function abrirVisor(i, tipo) {
    const item = datos[tipo][i];
    document.getElementById('nom-visor').innerText = item.nombre || "-";
    document.getElementById('img-visor').src = item.img || "https://via.placeholder.com/400x250?text=Sin+Mapa";
    document.getElementById('terr-visor').innerText = item.territorio || "-";
    document.getElementById('tiempo-visor').innerText = item.tiempo || "-";
    document.getElementById('fecha-ini-visor').innerText = formatearFecha(item.fechaInicio);
    document.getElementById('ult-trab-visor').innerText = formatearFecha(item.ultTrabajo);
    
    const boxGrupo = document.getElementById('box-grupo');
    if (item.esGrupo) {
      boxGrupo.style.display = "block";
      document.getElementById('es-grupo-visor').innerText = item.esGrupo;
    } else {
      boxGrupo.style.display = "none";
    }
    document.getElementById('visor').style.display = 'block';
  }

  function formatearFecha(f) {
    if (!f) return "-";
    return new Date(f).toLocaleDateString('es-ES');
  }

  function cerrarVisor() { document.getElementById('visor').style.display = 'none'; }
  function mostrarTab(t) {
    document.getElementById('seccion-con').style.display = (t === 'con') ? 'block' : 'none';
    document.getElementById('seccion-sin').style.display = (t === 'sin') ? 'block' : 'none';
    document.getElementById('tab-con').className = (t === 'con') ? 'tab active' : 'tab';
    document.getElementById('tab-sin').className = (t === 'sin') ? 'tab active' : 'tab';
  }
  function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? '' : 'light'); }
  
  cargarDatos();
</script>
</body>
</html>
