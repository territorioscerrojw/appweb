

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Super App Territorios</title>
  <style>
    body { background: #09090b; color: white; font-family: sans-serif; padding: 20px; }
    .card { background: #2d2d35; padding: 15px; border-radius: 14px; margin-bottom: 15px; }
    .card.terminado { opacity: 0.5; order: 99; }
    img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
    .btn-completar { background: #34c759; color: white; }
  </style>
</head>
<body>
  <main id="grid"></main>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbz3FNzhJoQFlp1mFebL89j__33o37ps9Y5LhcfQiwfrVXVhVkvuUKtZCz0qZvj7bxhd/exec";
    let datos = [];
    let cargando = false; // <--- CORTAFUEGOS

    function cargarDatos() {
      if (cargando) return; // Si ya está cargando, no hacer nada
      cargando = true;
      
      const script = document.createElement('script');
      // Usamos 'leerDatos' que es el nombre de la función que SÍ está en tu script
      script.src = `${URL_API}?accion=leerDatos&callback=test`;
      document.body.appendChild(script);
    }

    window.test = function(data) {
  cargando = false;
  if (data && Array.isArray(data)) {
    // FILTRO: Solo dejamos los que coinciden con el nombre del usuario
    // Suponiendo que el nombre viene en la URL como ?id=Jairo+Castañeda
    const nombreFiltro = new URLSearchParams(window.location.search).get('id');
    
    if (nombreFiltro) {
        datos = data.filter(t => t.hermano.toLowerCase() === nombreFiltro.toLowerCase());
    } else {
        datos = data;
    }
    renderizar();
  }
};

    function renderizar() {
  const grid = document.getElementById('grid');
  grid.innerHTML = "";
  
  datos.forEach(t => {
    const card = document.createElement('div');
    card.className = `card ${t.trabajado ? 'terminado' : ''}`;
    card.innerHTML = `
      <img src="${t.rutaMapa}" onerror="this.src='https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/imagenes/defecto.png'">
      <p><strong>Territorio:</strong> ${t.id}</p>
      <p><strong>Barriada:</strong> ${t.barriada}</p>
      <button class="btn" onclick="toggle('${t.id}')">
        ${t.trabajado ? 'Reactivar' : 'Completar'}
      </button>
    `;
    grid.appendChild(card);
  });
}

    function toggle(id) {
      const item = datos.find(x => x.id == id);
      if (!item) return;
      
      item.trabajado = !item.trabajado;
      renderizar(); // Actualizamos la vista localmente al instante
      
      // Llamada silenciosa al servidor
      fetch(`${URL_API}?accion=actualizarTrabajo&id=${id}&estado=${item.trabajado}`);
    }

    cargarDatos();
  </script>
</body>
</html>
