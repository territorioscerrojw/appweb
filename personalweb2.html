

<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territorios</title>
  <style>
    :root { --fondo: #09090b; --tarjeta: #1c1c1e; --acento: #007aff; }
    body { font-family: sans-serif; background: var(--fondo); color: white; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { background: var(--tarjeta); border-radius: 15px; padding: 15px; border: 1px solid #333; }
    .card.trabajado { opacity: 0.4; filter: grayscale(1); }
    img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    .btn { background: var(--acento); border: none; color: white; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Mis Territorios</h1>
  <div id="contenedor"></div>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbz3FNzhJoQFlp1mFebL89j__33o37ps9Y5LhcfQiwfrVXVhVkvuUKtZCz0qZvj7bxhd/exec";
    const nombre = new URLSearchParams(window.location.search).get('h') || "Nombre_Hermano";

    async function init() {
      const resp = await fetch(`${URL_API}?accion=obtenerTodo&h=${encodeURIComponent(nombre)}`);
      const data = await resp.json();
      renderizar(data);
    }

    function renderizar(data) {
      const cont = document.getElementById('contenedor');
      cont.innerHTML = "";
      
      // Función para pintar
      const pintar = (titulo, lista, esCampana) => {
        cont.innerHTML += `<h2>${titulo}</h2><div class="grid" id="grid-${titulo}"></div>`;
        const grid = document.getElementById(`grid-${titulo}`);
        lista.sort((a,b) => (a.trabajado || false) - (b.trabajado || false));
        
        lista.forEach(item => {
          grid.innerHTML += `
            <div class="card ${item.trabajado ? 'trabajado' : ''}">
              <img src="${item.rutaMapa || item.img || ''}">
              <h3>${item.id || item.num}</h3>
              <p>${item.barriada || item.zona}</p>
              ${esCampana ? `<button class="btn" onclick="cambiar('${item.id}', ${!item.trabajado})">${item.trabajado ? 'Reactivar' : 'Completar'}</button>` : ''}
            </div>`;
        });
      };

      pintar("Campaña", data.campana, true);
      pintar("Personales", data.portal.personales, false);
      pintar("Grupo", data.portal.grupo, false);
    }

    async function cambiar(id, estado) {
      await fetch(`${URL_API}?accion=actualizarTrabajo&id=${id}&estado=${estado}`);
      init();
    }
    init();
  </script>
</body>
</html>
