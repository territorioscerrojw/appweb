

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Super App Territorios</title>
  <style>
    body { background: #09090b; color: white; font-family: sans-serif; padding: 20px; }
    .card { background: #2d2d35; padding: 15px; border-radius: 14px; margin-bottom: 15px; }
    .card.terminado { opacity: 0.5; order: 99; }
    img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
    .btn-completar { background: #34c759; color: white; }
  </style>
</head>
<body>
  <main id="grid"></main>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbz3FNzhJoQFlp1mFebL89j__33o37ps9Y5LhcfQiwfrVXVhVkvuUKtZCz0qZvj7bxhd/exec";
    let datos = [];

    function cargarDatos() {
      window.test = function(data) {
        datos = data;
        renderizar();
      };
      const script = document.createElement('script');
     script.src = `${URL_API}?accion=leerDatos&callback=test`;
      document.body.appendChild(script);
    }
window.test = function(data) {
  console.log("Lo que recibí de Google:", data); // <--- MIRA ESTO EN LA CONSOLA
  datos = data;
  renderizar();
};
    function renderizar() {
  const grid = document.getElementById('grid');
  
  // 1. Verificamos si datos es realmente un array
  if (!Array.isArray(datos)) {
    console.error("Los datos recibidos no son una lista:", datos);
    grid.innerHTML = "<p>Error: No se pudieron cargar los territorios correctamente.</p>";
    return;
  }

  // 2. Ahora sí, hacemos el sort y el map
  const ordenado = [...datos].sort((a, b) => a.trabajado - b.trabajado);
  
  grid.innerHTML = ordenado.map(t => `
    <div class="card ${t.trabajado ? 'terminado' : ''}">
      <img src="${t.rutaMapa}" onerror="this.src='https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/imagenes/defecto.png'">
      <h3>${t.barriada}</h3>
      <button class="btn btn-completar" onclick="toggle('${t.id}')">
        ${t.trabajado ? 'Reactivar' : 'Completar'}
      </button>
    </div>
  `).join('');
}

    function toggle(id) {
      const item = datos.find(x => x.id == id);
      item.trabajado = !item.trabajado;
      renderizar();
      const script = document.createElement('script');
      script.src = `${URL_API}?accion=actualizarTrabajo&id=${id}&estado=${item.trabajado}&callback=void`;
      document.body.appendChild(script);
    }

    cargarDatos();
  </script>
</body>
</html>
