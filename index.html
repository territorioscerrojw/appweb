<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Territorios de grupo para la compaña</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="fondo-mapa-blur"></div>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <div class="cabecera-titulos">
        <h1 id="txt-campana-titulo">Cargando Campaña...</h1>
        <h2 id="txt-grupo-sub">Grupo...</h2>
      </div>
      <button id="btn-cambiar-tema" onclick="conmutarTema()"></button>
    </header>

    <section class="seccion-anillos">
      <div class="tarjeta-anillo">
        <div class="anillo-svg-wrapper">
          <svg viewBox="0 0 36 36" class="anillo-circular color-totales">
            <path class="anillo-fondo" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
          </svg>
          <div class="texto-dentro-anillo">
            <span id="w-totales" class="cifra-anillo">0</span>
            <span class="lbl-anillo">Totales</span>
          </div>
        </div>
      </div>

      <div class="tarjeta-anillo">
        <div class="anillo-svg-wrapper">
          <svg viewBox="0 0 36 36" class="anillo-circular color-prioritarios">
            <path class="anillo-fondo" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
            <path id="progreso-prioritarios" class="anillo-progreso" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
          </svg>
          <div class="texto-dentro-anillo">
            <span id="w-prioritarios" class="cifra-anillo">0</span>
            <span class="lbl-anillo">Prio</span>
          </div>
        </div>
      </div>

      <div class="tarjeta-anillo">
        <div class="anillo-svg-wrapper">
          <svg viewBox="0 0 36 36" class="anillo-circular color-asignados">
            <path class="anillo-fondo" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
            <path id="progreso-asignados" class="anillo-progreso" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
          </svg>
          <div class="texto-dentro-anillo">
            <span id="w-asignados" class="cifra-anillo">0</span>
            <span class="lbl-anillo">Calle</span>
          </div>
        </div>
      </div>

      <div class="tarjeta-anillo">
        <div class="anillo-svg-wrapper">
          <svg viewBox="0 0 36 36" class="anillo-circular color-completados">
            <path class="anillo-fondo" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
            <path id="progreso-completados" class="anillo-progreso" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"></path>
          </svg>
          <div class="texto-dentro-anillo">
            <span id="w-completados" class="cifra-anillo">0</span>
            <span class="lbl-anillo">Hechos</span>
          </div>
        </div>
      </div>
    </section>

    <nav class="contenedor-tabs">
      <div class="control-segmentado">
        <button class="tab activa" onclick="cambiarPestana('disponibles', this)">Disponibles</button>
        <button class="tab" onclick="cambiarPestana('asignados', this)">Asignados</button>
      </div>
    </nav>

    <div class="contenedor-busqueda">
      <div class="caja-input-icon">
        <svg class="ico-buscar-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="input-busqueda" placeholder="Buscar por número o barriada..." oninput="filtrarYRenderizar()">
      </div>
    </div>

    <div id="carrusel-pantallas-contenedor" class="contenedor-tabs-carrusel">
      
      <div class="pantalla-pestana-slide" id="slide-pestana-disponibles">
        <div id="contenedor-principal-grid" class="grid-apple"></div>
      </div>
      
      <div class="pantalla-pestana-slide" id="slide-pestana-asignados">
        </div>

    </div>

    <div id="contenedor-hermano-grid" class="grid-apple" style="display: none;"></div>

    <div id="panel-asignacion-unico" class="panel-asignacion-flotante">
      <div class="columna-panel-izquierda">
        <span id="txt-contador-seleccionados">0 seleccionados</span>
        <select id="sel-hermano-unico" onchange="evaluarEstadoBotonAsignar()"></select>
      </div>
      <button id="btn-asignar-multiple" class="btn-apple-bloqueado" disabled onclick="procesarAsignacionMultiple()">Asignar</button>
    </div>
  </div>

  <footer class="pie-tiempo-campana">
    <div class="datos-texto-pie">
      <span id="lbl-tiempo-restante">Calculando campaña...</span>
      <span id="lbl-porcentaje-tiempo">0%</span>
    </div>
    <div class="linea-progreso-fondo">
      <div id="barra-progreso-elemento" class="linea-progreso-relleno"></div>
    </div>
  </footer>

  <div id="modal-visor-pantalla-completa" class="visor-pantalla-completa">
    <div class="cabecera-visor-completo">
      <span id="titulo-visor-completo">Mapa</span>
      <button class="btn-cerrar-visor" onclick="cerrarVisorPantallaCompleta()">✕</button>
    </div>
    <div class="zona-scroll-zoom">
      <img id="img-visor-completa" src="" alt="Mapa Expandido">
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("id")) {
        const gridPrincipal = document.getElementById("contenedor-principal-grid");
        const carruselContenedor = document.getElementById("carrusel-pantallas-contenedor");
        if (gridPrincipal) gridPrincipal.style.display = "none";
        if (carruselContenedor) carruselContenedor.style.display = "none";
        
        document.getElementById("contenedor-hermano-grid").style.display = "flex";
        document.querySelector(".seccion-anillos").style.display = "none";
        document.querySelector(".contenedor-tabs").style.display = "none";
        document.querySelector(".contenedor-busqueda").style.display = "none";
        inicializarPantalla("hermano");
      } else {
        inicializarPantalla("encargado");
      }
    });
  </script>
</body>
</html>
