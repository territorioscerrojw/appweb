<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis Territorios</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Variables de alto contraste */
    html[data-theme="oscuro"] {
      --fondo-pantalla: #09090b;
      --fondo-tarjeta: #18181b;
      --borde-tarjeta: rgba(255, 255, 255, 0.15);
      --sombra-tarjeta: rgba(0, 0, 0, 0.5) 0px 4px 12px;
      --texto-principal: #ffffff;
      --texto-secundario: #a1a1aa;
    }

    html[data-theme="claro"] {
      --fondo-pantalla: #f4f4f5;
      --fondo-tarjeta: #ffffff;
      --borde-tarjeta: rgba(0, 0, 0, 0.12);
      --sombra-tarjeta: rgba(0, 0, 0, 0.08) 0px 4px 14px;
      --texto-principal: #09090b;
      --texto-secundario: #71717a;
    }

    body {
      background-color: var(--fondo-pantalla) !important;
      color: var(--texto-principal);
    }

    /* Estilos para las pestañas (Tabs) similares a index.html */
    .contenedor-tabs {
      padding: 0 16px;
      margin-bottom: 16px;
    }

    .control-segmentado {
      background: rgba(0, 0, 0, 0.1);
      padding: 3px;
      border-radius: 12px;
      display: flex;
      border: 1px solid var(--borde-tarjeta);
    }

    [data-theme="claro"] .control-segmentado {
      background: rgba(0, 0, 0, 0.05);
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--texto-secundario);
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.activa {
      background: var(--fondo-tarjeta);
      color: var(--texto-principal);
      box-shadow: var(--sombra-tarjeta);
    }

    .grid-mapas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Diseño de tarjeta de alto contraste */
    .tarjeta-mapa {
      background-color: var(--fondo-tarjeta) !important;
      border: 1px solid var(--borde-tarjeta) !important;
      box-shadow: var(--sombra-tarjeta) !important;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tarjeta-mapa .contenedor-imagen {
      position: relative;
      width: 100%;
      height: 160px;
      background-color: #000;
    }

    .tarjeta-mapa .imagen-mapa {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tarjeta-mapa .detalles-mapa {
      padding: 16px !important;
    }

    .numero-territorio-grande {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    .marca-agua-trabajado {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-20deg);
      color: #27ae60;
      font-size: 2rem;
      font-weight: 800;
      z-index: 10;
    }

    .tarjeta-mapa.terminado .marca-agua-trabajado { display: block; }
    .tarjeta-mapa.terminado .imagen-mapa { filter: brightness(1.2) opacity(0.4); }

    .btn-completar-accion {
      width: 100%; margin-top: 14px; padding: 12px;
      background: #27ae60; color: #fff; border: none;
      border-radius: 8px; font-weight: 700; cursor: pointer;
    }

    .btn-desmarcar-accion {
      width: 100%; margin-top: 14px; padding: 12px;
      background: transparent; color: var(--texto-secundario);
      border: 1px solid var(--borde-tarjeta); border-radius: 8px;
      font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <div class="cabecera-titulos">
        <h1>Mis territorios</h1>
        <h2 id="txt-campana-hermano">Cargando Campaña...</h2>
      </div>
      <button id="btn-cambiar-tema" onclick="conmutarTema()"></button>
    </header>

    <!-- Nueva sección de pestañas[cite: 6] -->
    <div class="contenedor-tabs">
      <div class="control-segmentado">
        <button id="tab-pendientes" class="tab activa" onclick="cambiarVistaHermano('pendientes')">Pendientes</button>
        <button id="tab-completados" class="tab" onclick="cambiarVistaHermano('completados')">Completados</button>
      </div>
    </div>

    <main class="grid-mapas" id="contenedor-hermano-grid"></main>
  </div>

  <script>
    const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    let datosLocalesHermano = [];
    let idHermanoUrl = null;
    let vistaActual = 'pendientes'; // Estado inicial

    window.addEventListener("DOMContentLoaded", () => {
      configurarTemaInicial();
      const params = new URLSearchParams(window.location.search);
      idHermanoUrl = params.get("id");
      if (!idHermanoUrl) return;
      cargarDatosFlujoHermano();
    });

    async function cargarDatosFlujoHermano() {
      try {
        const respuesta = await fetch(`${URL_API_SHEETS}?accion=leerDatos`);
        const data = await respuesta.json();
        if (data && data.length > 0) {
          document.getElementById("txt-campana-hermano").innerText = data[0].campana || "Campaña Activa";
          datosLocalesHermano = data.filter(item => item.hermano.toLowerCase().trim() === idHermanoUrl.toLowerCase().trim());
          inyectarTarjetasHermano();
        }
      } catch (err) { console.error(err); }
    }

    // Función para cambiar de pestaña
    function cambiarVistaHermano(nuevaVista) {
      vistaActual = nuevaVista;
      document.getElementById('tab-pendientes').classList.toggle('activa', vistaActual === 'pendientes');
      document.getElementById('tab-completados').classList.toggle('activa', vistaActual === 'completados');
      inyectarTarjetasHermano();
    }

    function inyectarTarjetasHermano() {
      const contenedor = document.getElementById("contenedor-hermano-grid");
      contenedor.innerHTML = "";

      // Filtrado según la pestaña seleccionada
      const filtrados = datosLocalesHermano.filter(mapa => {
        return vistaActual === 'pendientes' ? !mapa.trabajado : mapa.trabajado;
      });

      if (filtrados.length === 0) {
        contenedor.innerHTML = `<p style="text-align:center; padding:40px; color:var(--texto-secundario);">No hay mapas en esta sección.</p>`;
        return;
      }

      filtrados.forEach(mapa => {
        const div = document.createElement("div");
        div.className = `tarjeta-mapa ${mapa.trabajado ? 'terminado' : ''}`;
        div.innerHTML = `
          <div class="contenedor-imagen">
            <div class="marca-agua-trabajado">TRABAJADO</div>
            <img src="${mapa.rutaMapa}" class="imagen-mapa">
          </div>
          <div class="detalles-mapa">
            <div style="display:flex; justify-content:space-between;">
              <h3 style="margin:0; font-size:16px;">${mapa.barriada}</h3>
              <span class="numero-territorio-grande">${mapa.id}</span>
            </div>
            ${!mapa.trabajado 
              ? `<button class="btn-completar-accion" onclick="cambiarEstadoTerritorio('${mapa.id}', 'completar')">Marcar Completado</button>`
              : `<button class="btn-desmarcar-accion" onclick="cambiarEstadoTerritorio('${mapa.id}', 'desmarcar')">Reactivar Mapa</button>`
            }
          </div>
        `;
        contenedor.appendChild(div);
      });
    }

    async function cambiarEstadoTerritorio(idMapa, modo) {
      const indice = datosLocalesHermano.findIndex(item => item.id.toString() === idMapa.toString());
      if (indice === -1) return;

      datosLocalesHermano[indice].trabajado = (modo === "completar");
      inyectarTarjetasHermano();

      const accionUrl = modo === "completar" ? "completar" : `asignar&hermano=${encodeURIComponent(idHermanoUrl)}`;
      fetch(`${URL_API_SHEETS}?accion=${accionUrl}&id=${encodeURIComponent(idMapa)}`, { mode: 'no-cors' });
    }

    function conmutarTema() {
      const nuevoTema = document.documentElement.getAttribute("data-theme") === "oscuro" ? "claro" : "oscuro";
      document.documentElement.setAttribute("data-theme", nuevoTema);
      localStorage.setItem("tema-preferido", nuevoTema);
    }

    function configurarTemaInicial() {
      const tema = localStorage.getItem("tema-preferido") || "oscuro";
      document.documentElement.setAttribute("data-theme", tema);
    }
  </script>
</body>
</html>
