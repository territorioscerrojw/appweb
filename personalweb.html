<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis Territorios</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Estilos de alto contraste */
    html[data-theme="oscuro"] {
      --fondo-pantalla: #09090b;
      --fondo-tarjeta: #18181b;
      --borde-tarjeta: rgba(255, 255, 255, 0.15);
      --sombra-tarjeta: rgba(0, 0, 0, 0.5) 0px 4px 12px;
      --texto-principal: #ffffff;
      --texto-secundario: #a1a1aa;
    }

    html[data-theme="claro"] {
      --fondo-pantalla: #f4f4f5;
      --fondo-tarjeta: #ffffff;
      --borde-tarjeta: rgba(0, 0, 0, 0.12);
      --sombra-tarjeta: rgba(0, 0, 0, 0.08) 0px 4px 14px;
      --texto-principal: #09090b;
      --texto-secundario: #71717a;
    }

    body {
      background-color: var(--fondo-pantalla) !important;
      color: var(--texto-principal);
      /* Evita rebotes raros en iOS al deslizar */
      overscroll-behavior-x: none; 
    }

    .contenedor-tabs {
      padding: 0 16px;
      margin-bottom: 16px;
    }

    /* Contenedor táctil para capturar el deslizamiento */
    .zona-deslizable {
      min-height: calc(100vh - 180px);
      width: 100%;
    }

    .grid-mapas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 16px;
      width: 100%;
    }

    .tarjeta-mapa {
      background-color: var(--fondo-tarjeta) !important;
      border: 1px solid var(--borde-tarjeta) !important;
      box-shadow: var(--sombra-tarjeta) !important;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .contenedor-imagen {
      position: relative;
      width: 100%;
      height: 160px; 
      background-color: #000;
      border-bottom: 1px solid var(--borde-tarjeta);
    }

    .imagen-mapa { width: 100%; height: 100%; object-fit: cover; }

    .numero-territorio-grande {
      font-size: 30px;
      font-weight: 800;
      color: var(--texto-principal);
      letter-spacing: -1px;
    }

    .badge-estado {
      display: inline-flex;
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-pendiente { background-color: rgba(235, 87, 87, 0.15); color: var(--apple-rojo); }
    .badge-completado { background-color: rgba(39, 174, 96, 0.15); color: var(--apple-verde); }

    .btn-accion {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }

    .btn-completar { background: var(--apple-verde); color: white; }
    .btn-reactivar { background: transparent; border: 1px solid var(--borde-tarjeta); color: var(--texto-secundario); }
  </style>
</head>
<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <div class="cabecera-titulos">
        <h1>Mis territorios</h1>
        <h2 id="txt-campana-hermano">Cargando...</h2>
      </div>
      <button id="btn-cambiar-tema" onclick="conmutarTema()"></button>
    </header>

    <div class="contenedor-tabs">
      <div class="control-segmentado">
        <button id="tab-pendientes" class="tab activa" onclick="cambiarVistaHermano('pendientes')">Pendientes</button>
        <button id="tab-completados" class="tab" onclick="cambiarVistaHermano('completados')">Completados</button>
      </div>
    </div>

    <!-- Envuelve el contenido en una zona deslizable -->
    <div id="zona-tactil" class="zona-deslizable">
      <main class="grid-mapas" id="contenedor-hermano-grid"></main>
    </div>
  </div>

  <!-- Visor de imágenes -->
  <div id="modal-visor-pantalla-completa" class="visor-pantalla-completa">
    <div class="cabecera-visor-completo">
      <span id="titulo-visor-completo">Mapa</span>
      <button class="btn-cerrar-visor" onclick="cerrarVisorPantallaCompleta()">✕</button>
    </div>
    <div class="zona-scroll-zoom">
      <img id="img-visor-completa" src="">
    </div>
  </div>

  <script>
    const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    let datosLocalesHermano = [];
    let idHermanoUrl = null;
    let vistaActualHermano = 'pendientes';[cite: 5]

    // Variables para controlar el gesto de deslizamiento
    let toqueInicioX = 0;
    let toqueFinX = 0;

    window.addEventListener("DOMContentLoaded", () => {
      configurarTemaInicial();
      const params = new URLSearchParams(window.location.search);
      idHermanoUrl = params.get("id");
      if (!idHermanoUrl) return;
      cargarDatosFlujoHermano();
      configurarGestoDeslizar(); // Activa el soporte para Swipe
    });

    async function cargarDatosFlujoHermano() {
      try {
        const respuesta = await fetch(`${URL_API_SHEETS}?accion=leerDatos`);
        const data = await respuesta.json();
        if (data && data.length > 0) {
          document.getElementById("txt-campana-hermano").innerText = data[0].campana || "Campaña Activa";
          datosLocalesHermano = data.filter(item => item.hermano.toLowerCase().trim() === idHermanoUrl.toLowerCase().trim());
          inyectarTarjetasHermano();
        }
      } catch (err) { console.error(err); }
    }

    function cambiarVistaHermano(nuevaVista) {
      if (vistaActualHermano === nuevaVista) return;
      vistaActualHermano = nuevaVista;[cite: 5]
      document.getElementById('tab-pendientes').classList.toggle('activa', nuevaVista === 'pendientes');
      document.getElementById('tab-completados').classList.toggle('activa', nuevaVista === 'completados');
      inyectarTarjetasHermano();
    }

    // Configuración de gestos táctiles (Swipe)
    function configurarGestoDeslizar() {
      const zonaTactil = document.getElementById("zona-tactil");

      zonaTactil.addEventListener("touchstart", (e) => {
        toqueInicioX = e.changedTouches[0].screenX;
      }, { passive: true });

      zonaTactil.addEventListener("touchend", (e) => {
        toqueFinX = e.changedTouches[0].screenX;
        evaluarGesto();
      }, { passive: true });
    }

    function evaluarGesto() {
      const umbralDistancia = 70; // Píxeles mínimos para activar el cambio
      const diferenciaX = toqueFinX - toqueInicioX;

      // Deslizar de izquierda a derecha -> Ir a Pendientes
      if (diferenciaX > umbralDistancia && vistaActualHermano === 'completados') {
        cambiarVistaHermano('pendientes');
      }
      // Deslizar de derecha a izquierda -> Ir a Completados
      else if (diferenciaX < -umbralDistancia && vistaActualHermano === 'pendientes') {
        cambiarVistaHermano('completados');
      }
    }

    function inyectarTarjetasHermano() {
      const contenedor = document.getElementById("contenedor-hermano-grid");
      contenedor.innerHTML = "";[cite: 5]

      const mapasFiltrados = datosLocalesHermano.filter(mapa => 
        vistaActualHermano === 'pendientes' ? !mapa.trabajado : mapa.trabajado[cite: 5]
      );

      if (mapasFiltrados.length === 0) {
        contenedor.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--texto-secundario);">
          <h3>No hay territorios ${vistaActualHermano}</h3>
        </div>`;
        return;
      }

      mapasFiltrados.forEach(mapa => {
        const div = document.createElement("div");
        div.className = "tarjeta-mapa";
        div.innerHTML = `
          <div class="contenedor-imagen">
            <img src="${mapa.rutaMapa}" class="imagen-mapa" onclick="abrirVisorPantallaCompleta('${mapa.rutaMapa}', 'Territorio ${mapa.id}')">
          </div>
          <div class="detalles-mapa" style="padding:16px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3 style="margin:0; font-size:16px;">${mapa.barriada}</h3>
              <span class="numero-territorio-grande">${mapa.id}</span>
            </div>
            <div style="margin-top:12px;">
              ${!mapa.trabajado 
                ? `<span class="badge-estado badge-pendiente">● PENDIENTE</span>
                   <button class="btn-accion btn-completar" onclick="cambiarEstadoTerritorio('${mapa.id}', 'completar')">Marcar como completado</button>`[cite: 7]
                : `<span class="badge-estado badge-completado">✓ TRABAJADO</span>
                   <button class="btn-accion btn-reactivar" onclick="cambiarEstadoTerritorio('${mapa.id}', 'desmarcar')">Reactivar territorio</button>`[cite: 7]
              }
            </div>
          </div>
        `;
        contenedor.appendChild(div);
      });
    }

    async function cambiarEstadoTerritorio(idMapa, modo) {
      const indice = datosLocalesHermano.findIndex(item => item.id.toString() === idMapa.toString());
      if (indice === -1) return;
      
      datosLocalesHermano[indice].trabajado = (modo === "completar");[cite: 5]
      inyectarTarjetasHermano();

      const accionUrl = modo === "completar" ? "completar" : `asignar&hermano=${encodeURIComponent(idHermanoUrl)}`;
      await fetch(`${URL_API_SHEETS}?accion=${accionUrl}&id=${encodeURIComponent(idMapa)}`, { mode: 'no-cors' });
    }

    // Funciones auxiliares de UI[cite: 8]
    function conmutarTema() {
      const nuevo = document.documentElement.getAttribute("data-theme") === "oscuro" ? "claro" : "oscuro";
      document.documentElement.setAttribute("data-theme", nuevo);
      localStorage.setItem("tema-preferido", nuevo);
    }
    function configurarTemaInicial() {
      document.documentElement.setAttribute("data-theme", localStorage.getItem("tema-preferido") || "oscuro");
    }
    function abrirVisorPantallaCompleta(src, titulo) {
      document.getElementById("img-visor-completa").src = src;
      document.getElementById("titulo-visor-completo").innerText = titulo;
      document.getElementById("modal-visor-pantalla-completa").style.display = "flex";
    }
    function cerrarVisorPantallaCompleta() {
      document.getElementById("modal-visor-pantalla-completa").style.display = "none";
    }
  </script>
</body>
</html>
