<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis Territorios</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* ==========================================================================
       CORRECCIONES DE CONFIGURACIÓN Y TAMAÑOS PARA LA VISTA DEL HERMANO
       ========================================================================== */
    
    /* Forzar que el grid de mapas no se estire y sea compacto */
    .grid-mapas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Contenedor controlado para evitar gigantismo */
    .tarjeta-territorio-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      max-width: 100%;
    }

    /* Ajuste de la tarjeta base para que use el formato nativo liso */
    .tarjeta-mapa {
      background-color: var(--glass-fondo, #121214) !important;
      border: 1px solid var(--glass-borde, rgba(255, 255, 255, 0.08)) !important;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: transform 0.2s ease, opacity 0.3s ease;
    }

    /* Redimensionado estricto de la zona de la imagen */
    .tarjeta-mapa .contenedor-imagen {
      position: relative;
      width: 100%;
      height: 160px; /* Altura máxima fija para que no explote en pantallas grandes */
      overflow: hidden;
      background-color: #000;
    }

    .tarjeta-mapa .imagen-mapa {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Ajusta la foto sin deformarla */
      display: block;
      transition: filter 0.3s ease;
    }

    /* Ajuste de los acolchados del texto inferior */
    .tarjeta-mapa .detalles-mapa {
      padding: 14px !important;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .tarjeta-mapa .titulo-barrio {
      font-size: 16px !important;
      font-weight: 700;
      margin: 0 0 4px 0 !important;
      color: var(--texto-principal) !important;
    }

    .tarjeta-mapa .subtexto-campana {
      font-size: 12px !important;
      color: var(--texto-secundario) !important;
      margin: 0 !important;
    }

    /* Marca de agua diagonal "TRABAJADO" estilo sello premium */
    .marca-agua-trabajado {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-22deg);
      color: rgba(39, 174, 96, 0.35);
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 4px solid rgba(39, 174, 96, 0.4);
      padding: 6px 18px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
      background-color: rgba(9, 9, 11, 0.2);
    }

    /* Comportamiento del estado Terminado */
    .tarjeta-mapa.terminado { 
      opacity: 0.6; 
    }
    .tarjeta-mapa.terminado .imagen-mapa {
      filter: grayscale(1) contrast(0.85); 
    }
    .tarjeta-mapa.terminado .marca-agua-trabajado {
      display: block;
    }

    /* Modificadores de las etiquetas de estado */
    .badge-estado {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge-pendiente {
      background-color: rgba(235, 87, 87, 0.12);
      color: var(--apple-rojo);
    }
    .badge-completado {
      background-color: rgba(39, 174, 96, 0.12);
      color: var(--apple-verde);
    }

    /* Ajuste del botón de acción interactivo */
    .btn-completar-accion {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: var(--apple-verde);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .btn-completar-accion:disabled {
      background: var(--glass-borde);
      color: var(--texto-secundario);
      cursor: not-allowed;
    }

    /* Pantalla de bloqueo */
    .pantalla-bloqueo {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
      background: var(--fondo-base, #09090b); z-index: 99999; 
      display: flex; flex-direction: column; justify-content: center; 
      align-items: center; text-align: center; padding: 30px;
    }
    .pantalla-bloqueo h2 { font-size: 26px; margin-bottom: 10px; color: var(--apple-rojo); font-weight: 700; }
  </style>
</head>
<body>

  <div class="fondo-mapa-blur"></div>

  <div id="bloqueo-temporal" class="pantalla-bloqueo" style="display: none;">
    <h2>Campaña no disponible</h2>
    <p style="color: var(--texto-secundario);">Esta sección solo se activará desde una semana antes de la campaña y hasta 3 días después de vuestro cierre.</p>
  </div>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <div class="cabecera-titulos">
        <h1>Mis territorios</h1>
        <h2 id="txt-campana-hermano">Cargando Campaña...</h2>
      </div>
      <button id="btn-cambiar-tema" onclick="conmutarTema()"></button>
    </header>

    <main class="grid-mapas" id="contenedor-hermano-grid" style="margin-top: 16px; padding-bottom: 60px;"></main>
  </div>

  <div id="modal-visor-pantalla-completa" class="visor-pantalla-completa">
    <div class="cabecera-visor-completo">
      <span id="titulo-visor-completo">Mapa Ampliado</span>
      <button class="btn-cerrar-visor" onclick="cerrarVisorPantallaCompleta()">✕</button>
    </div>
    <div class="zona-scroll-zoom">
      <img id="img-visor-completa" src="" alt="Mapa Expandido">
    </div>
  </div>

  <script>
    const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    
    let datosLocalesHermano = [];
    let idHermanoUrl = null;

    window.addEventListener("DOMContentLoaded", () => {
      configurarTemaInicial();
      const params = new URLSearchParams(window.location.search);
      idHermanoUrl = params.get("id");

      if (!idHermanoUrl) {
        document.body.innerHTML = "<div style='padding:40px; text-align:center; font-family:sans-serif; color:white;'><h3>Error: Enlace incorrecto</h3><p>Falta especificar el identificador en la URL (?id=...)</p></div>";
        return;
      }

      cargarDatosFlujoHermano();
    });

    function conmutarTema() {
      const html = document.documentElement;
      const temaActual = html.getAttribute("data-theme");
      const nuevoTema = temaActual === "oscuro" ? "claro" : "oscuro";
      html.setAttribute("data-theme", nuevoTema);
      localStorage.setItem("tema-preferido", nuevoTema);
    }

    function configurarTemaInicial() {
      const temaGuardado = localStorage.getItem("tema-preferido") || "oscuro";
      document.documentElement.setAttribute("data-theme", temaGuardado);
    }

    async function cargarDatosFlujoHermano() {
      try {
        const urlPeticion = `${URL_API_SHEETS}?accion=leerDatos`;
        const respuesta = await fetch(urlPeticion);
        const data = await respuesta.json();
        
        if (data && data.length > 0) {
          document.getElementById("txt-campana-hermano").innerText = data[0].campana || "Campaña Activa";
          datosLocalesHermano = data.filter(item => item.hermano.toLowerCase().trim() === idHermanoUrl.toLowerCase().trim());
          inyectarTarjetasHermano();
        }
      } catch (err) {
        console.error("Error al leer datos:", err);
        document.getElementById("contenedor-hermano-grid").innerHTML = "<p style='color:var(--apple-rojo); text-align:center;'>Error al sincronizar tus mapas.</p>";
      }
    }

    function inyectarTarjetasHermano() {
      const contenedor = document.getElementById("contenedor-hermano-grid");
      contenedor.innerHTML = "";

      if (datosLocalesHermano.length === 0) {
        contenedor.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--texto-secundario);">
          <h3>No se encontraron territorios</h3>
          <p>Actualmente no constan mapas bajo tu nombre en esta campaña.</p>
        </div>`;
        return;
      }

      // Ordenar: Pendientes arriba, Trabajados abajo
      datosLocalesHermano.sort((a, b) => a.trabajado - b.trabajado);

      datosLocalesHermano.forEach(mapa => {
        const esTerminado = mapa.trabajado;
        const wrapper = document.createElement("div");
        wrapper.className = "tarjeta-territorio-wrapper";

        wrapper.innerHTML = `
          <div class="tarjeta-mapa ${esTerminado ? 'terminado' : ''}">
            <div class="marca-agua-trabajado">Trabajado</div>
            
            <div class="contenedor-imagen" onclick="abrirVisorPantallaCompleta('${mapa.rutaMapa}', 'Territorio ${mapa.id}')" style="cursor:pointer;">
              <img src="${mapa.rutaMapa}" class="imagen-mapa" alt="Mapa" onerror="this.src='imagenes/mapa_defecto.png'">
              <div class="badge-id">${mapa.id}</div>
            </div>
            
            <div class="detalles-mapa">
              <h3 class="titulo-barrio">${mapa.barriada}</h3>
              <p class="subtexto-campana">Devolver antes de: <b>${mapa.fechaEntrega}</b></p>
              
              <div style="margin-top: 10px; display:flex; justify-content:space-between; align-items:center;">
                ${esTerminado 
                  ? `<span class="badge-estado badge-completado">✓ TRABAJADO</span>` 
                  : `<span class="badge-estado badge-pendiente">● PENDIENTE</span>`
                }
              </div>

              ${!esTerminado ? `
                <button id="btn-accion-${mapa.id}" class="btn-completar-accion" onclick="marcarTerritorioComoTrabajado('${mapa.id}')">
                  Marcar como completado
                </button>
              ` : ''}
            </div>
          </div>
        `;
        contenedor.appendChild(wrapper);
      });
    }

    async function marcarTerritorioComoTrabajado(idMapa) {
      const boton = document.getElementById(`btn-accion-${idMapa}`);
      if (boton) {
        boton.disabled = true;
        boton.innerText = "Guardando...";
      }

      try {
        const urlAsignacion = `${URL_API_SHEETS}?accion=completar&id=${encodeURIComponent(idMapa)}`;
        await fetch(urlAsignacion, { method: "GET", mode: "no-cors" });

        const indice = datosLocalesHermano.findIndex(item => item.id.toString() === idMapa.toString());
        if (indice !== -1) {
          datosLocalesHermano[indice].trabajado = true;
        }

        inyectarTarjetasHermano();

      } catch (error) {
        console.error("Error:", error);
        alert("No se pudo guardar. Inténtalo de nuevo.");
        if (boton) {
          boton.disabled = false;
          boton.innerText = "Marcar como completado";
        }
      }
    }

    function abrirVisorPantallaCompleta(src, titulo) {
      document.getElementById("img-visor-completa").src = src;
      document.getElementById("titulo-visor-completo").innerText = titulo;
      document.getElementById("modal-visor-pantalla-completa").style.display = "flex";
    }

    function cerrarVisorPantallaCompleta() {
      document.getElementById("modal-visor-pantalla-completa").style.display = "none";
    }
  </script>
</body>
</html>
