<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis Territorios de campaña</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;1000&display=swap">
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Variables de alto contraste */
    html[data-theme="oscuro"] {
      --fondo-pantalla: #09090b;
      --fondo-tarjeta: #2d2d35;
      --borde-tarjeta: rgba(255, 255, 255, 0.15);
      --sombra-tarjeta: rgba(0, 0, 0, 0.5) 0px 4px 12px;
      --texto-principal: #ffffff;
      --texto-secundario: #a1a1aa;
    }

    html[data-theme="claro"] {
      --fondo-pantalla: #f4f4f5;
      --fondo-tarjeta: #ffffff;
      --borde-tarjeta: rgba(0, 0, 0, 0.12);
      --sombra-tarjeta: rgba(0, 0, 0, 0.08) 0px 4px 14px;
      --texto-principal: #09090b;
      --texto-secundario: #71717a;
    }

    body {
      background-color: var(--fondo-pantalla) !important;
      color: var(--texto-principal);
      overflow-x: hidden; /* Evita barras de scroll horizontal molestas */
        }

    /* Estilos para las pestañas (Tabs) similares a index.html */
    .contenedor-tabs {
      padding: 0 16px;
      margin-bottom: 16px;
    }

    .control-segmentado {
      background: rgba(0, 0, 0, 0.1);
      padding: 3px;
      border-radius: 12px;
      display: flex;
      border: 1px solid var(--borde-tarjeta);
       font-size: 16px
    }

    [data-theme="claro"] .control-segmentado {
      background: rgba(0, 0, 0, 0.05);
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--texto-secundario);
      padding: 10px 0;
      font-size: 16px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.activa {
      background: var(--fondo-tarjeta);
      color: var(--texto-principal);
      box-shadow: var(--sombra-tarjeta);
    }

    /* CONTENEDORES PARA EL EFECTO DE ARRASTRE TIPO APPLE */
    .viewport-deslizable {
      width: 100%;
      overflow: hidden;
      touch-action: pan-y; /* Permite scroll vertical libre pero bloquea el horizontal nativo */
    }

    .carrete-panoramico {
      display: flex;
      width: 200%; /* Dos pestañas = 200% del ancho */
      will-change: transform;
    }

    .carrete-panoramico.con-transicion {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); /* Curva suave de desaceleración Apple */
    }

    .seccion-tab-contenido {
      width: 50%; /* Cada sección ocupa exactamente la mitad del carrete (100% de la pantalla) */
      flex-shrink: 0;
    }

    .grid-mapas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Diseño de tarjeta de alto contraste */
    .tarjeta-mapa {
      background-color: var(--fondo-tarjeta) !important;
      border: 1px solid var(--borde-tarjeta) !important;
      box-shadow: var(--sombra-tarjeta) !important;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tarjeta-mapa .contenedor-imagen {
      position: relative;
      width: 100%;
      height: 160px;
      background-color: #000;
    }

    .tarjeta-mapa .imagen-mapa {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tarjeta-mapa .detalles-mapa {
      padding: 16px !important;
    }

    .numero-territorio-grande {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

  /* 1. Mantenemos el contenedor de la marca de agua oculto por defecto */
.marca-agua-trabajado {
  display: none; 
  position: absolute;
  top: 0; 
  left: 0;
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
  transform: rotate(-30deg);
  color: rgba(255, 255, 255, 0.6);
  font-size: 1.8rem;
  font-weight: 900;
  z-index: 10;
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* 2. Solo cuando la tarjeta tiene la clase 'terminado', mostramos el bloque */
.tarjeta-mapa.terminado .marca-agua-trabajado {
  display: flex; /* Esto activa el centrado y la visibilidad */
}

/* 3. Aseguramos que la imagen se atenúe solo en las terminadas */
.tarjeta-mapa.terminado .imagen-mapa {
  filter: brightness(0.6) opacity(0.8);
}
    .btn-completar-accion {
      width: 100%; margin-top: 14px; padding: 12px;
      background: #27ae60; color: #fff; border: none;
      border-radius: 8px; font-weight: 700; cursor: pointer;
      font-size: 20px
    }

    .btn-desmarcar-accion {
      width: 100%; margin-top: 14px; padding: 12px;
      background: transparent; color: var(--texto-secundario);
      border: 1px solid var(--borde-tarjeta); border-radius: 8px;
      font-weight: 600; cursor: pointer;
      font-size: 20px
    }
.visor-oculto {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

#imagen-ampliada {
  max-width: 90%;
  max-height: 80%;
  object-fit: contain;
  border-radius: 8px;
  /* Esto permite el zoom nativo en móviles con los dedos */
}

.btn-cerrar-visor {
  position: absolute;
  top: 20px; 
  right: 20px;
  color: #ffffff;
  font-size: 32px;
  font-family: Arial, sans-serif; /* Fuente estándar para una X perfecta */
  font-weight: bold;
  cursor: pointer;
  line-height: 1;
  padding: 10px;
  /* Eliminamos background, border-radius y cualquier sombra */
  background: none;
  border: none;
  z-index: 1001;
}
    
  </style>
</head>
<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <div class="cabecera-titulos">
        <h1>Campaña</h1>
        <h2 id="txt-campana-hermano">Cargando Campaña...</h2>
      </div>
      <button id="btn-cambiar-tema" onclick="conmutarTema()"></button>
    </header>
<footer class="barra-tiempo-footer">
  <div class="info-tiempo-texto">
    <span id="lbl-tiempo-restante">Calculando progreso...</span>
    <span id="lbl-porcentaje-tiempo">0%</span>
  </div>
  <div class="linea-progreso-fondo">
    <div id="barra-progreso-elemento" class="linea-progreso-relleno"></div>
  </div>
</footer>

    <div class="contenedor-tabs">
      <div class="control-segmentado">
        <button id="tab-pendientes" class="tab activa" onclick="moverAColumna(0)">Pendientes</button>
        <button id="tab-completados" class="tab" onclick="moverAColumna(1)">Completados</button>
      </div>
    </div>

    <div class="viewport-deslizable" id="viewport-tactil">
      <div class="carrete-panoramico con-transicion" id="carrete">
        
        <div class="seccion-tab-contenido">
          <main class="grid-mapas" id="grid-pendientes"></main>
        </div>

        <div class="seccion-tab-contenido">
          <main class="grid-mapas" id="grid-completados"></main>
        </div>

      </div>
    </div>
  </div>

  <script>
    const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    let datosLocalesHermano = [];
    let idHermanoUrl = null;

    // Variables de control de arrastre mecánico (Física estilo Apple)
    let columnaActual = 0; // 0: Pendientes, 1: Completados
    let inicioX = 0;
    let inicioY = 0;
    let cambioX = 0;
    let arrastrando = false;
    let esScrollVertical = false;

    window.addEventListener("DOMContentLoaded", () => {
      configurarTemaInicial();
      const params = new URLSearchParams(window.location.search);
      idHermanoUrl = params.get("id");
      if (!idHermanoUrl) return;
      cargarDatosFlujoHermano();
      configurarArrastreMecanico();
    });

    async function cargarDatosFlujoHermano() {
  try {
    const respuesta = await fetch(`${URL_API_SHEETS}?accion=leerDatos`);
    const data = await respuesta.json();
    if (data && data.length > 0) {
      document.getElementById("txt-campana-hermano").innerText = data[0].campana || "Campaña Activa";
      
      // CAMBIO AQUÍ: Pasamos los valores que vienen en el JSON
      // Asegúrate de que 'inicio' y 'fin' coincidan con los nombres de tus columnas en Sheets
      procesarFechasYBarras(data[0].inicio, data[0].fin); 
      
      datosLocalesHermano = data.filter(item => item.hermano.toLowerCase().trim() === idHermanoUrl.toLowerCase().trim());
      inyectarTarjetasHermano();
    }
  } catch (err) { console.error(err); }
}


    function inyectarTarjetasHermano() {
      const contenedorPendientes = document.getElementById("grid-pendientes");
      const contenedorCompletados = document.getElementById("grid-completados");
      
      contenedorPendientes.innerHTML = "";
      contenedorCompletados.innerHTML = "";

      const pendientes = datosLocalesHermano.filter(m => !m.trabajado);
      const completados = datosLocalesHermano.filter(m => m.trabajado);

      // Renderizar Pendientes
      if (pendientes.length === 0) {
        contenedorPendientes.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--texto-secundario);">No hay mapas pendientes.</p>`;
      } else {
        pendientes.forEach(mapa => contenedorPendientes.appendChild(crearTarjetaDOM(mapa)));
      }

      // Renderizar Completados
      if (completados.length === 0) {
        contenedorCompletados.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--texto-secundario);">No hay mapas completados.</p>`;
      } else {
        completados.forEach(mapa => contenedorCompletados.appendChild(crearTarjetaDOM(mapa)));
      }
    }

    function crearTarjetaDOM(mapa) {
      const div = document.createElement("div");
      div.className = `tarjeta-mapa ${mapa.trabajado ? 'terminado' : ''}`;

      // Botones corregidos sin paréntesis
      let botonHTML = "";
      if (!mapa.trabajado) {
        botonHTML = `<button class="btn-completar-accion" onclick="cambiarEstadoTerritorio('${mapa.id}', 'completar')">Marcar como completado</button>`;
      } else {
        botonHTML = `<button class="btn-desmarcar-accion" onclick="cambiarEstadoTerritorio('${mapa.id}', 'desmarcar')">Reactivar territorio</button>`;
      }

      div.innerHTML = `
        <div class="contenedor-imagen">
          <div class="marca-agua-trabajado">TRABAJADO</div>
          <img src="${mapa.rutaMapa}" class="imagen-mapa" onclick="abrirVisor('${mapa.rutaMapa}')" style="cursor: pointer;">
        </div>
        <div class="detalles-mapa">
          <div style="display:flex; justify-content:space-between;">
            <h3 style="margin:0; font-size:16px;">${mapa.barriada}</h3>
            <span class="numero-territorio-grande">${mapa.id}</span>
          </div>
          ${botonHTML}
        </div>
      `;
      return div;
    }

    async function cambiarEstadoTerritorio(idMapa, modo) {
      const indice = datosLocalesHermano.findIndex(item => item.id.toString() === idMapa.toString());
      if (indice === -1) return;

      datosLocalesHermano[indice].trabajado = (modo === "completar");
      inyectarTarjetasHermano();
      procesarFechasYBarras(); 

      const accionUrl = modo === "completar" ? "completar" : `asignar&hermano=${encodeURIComponent(idHermanoUrl)}`;
      fetch(`${URL_API_SHEETS}?accion=${accionUrl}&id=${encodeURIComponent(idMapa)}`, { mode: 'no-cors' });
    }

    /* LÓGICA DE FÍSICA Y ARRASTRE EN TIEMPO REAL (Estilo Apple) */
    function configurarArrastreMecanico() {
      const viewport = document.getElementById("viewport-tactil");
      const carrete = document.getElementById("carrete");

      viewport.addEventListener("touchstart", (e) => {
        inicioX = e.touches[0].clientX;
        inicioY = e.touches[0].clientY;
        arrastrando = true;
        esScrollVertical = false;
        // Quitamos la transición temporalmente para que responda instantáneamente al dedo
        carrete.classList.remove("con-transicion");
      }, { passive: true });

      viewport.addEventListener("touchmove", (e) => {
        if (!arrastrando) return;

        let actualX = e.touches[0].clientX;
        let actualY = e.touches[0].clientY;

        cambioX = actualX - inicioX;
        let cambioY = actualY - inicioY;

        // Detectar si el usuario quiere hacer scroll hacia abajo en vez de deslizar lateralmente
        if (!esScrollVertical && Math.abs(cambioY) > Math.abs(cambioX) && Math.abs(cambioY) > 10) {
          esScrollVertical = true;
          arrastrando = false;
          return;
        }

        if (esScrollVertical) return;

        // Calcular la posición base en píxeles de la pestaña actual
        let anchoPantalla = viewport.clientWidth;
        let posicionBase = -columnaActual * anchoPantalla;
        let nuevaPosicionPixels = posicionBase + cambioX;

        // Límites elásticos estilo resistencia iOS en los extremos
        if (nuevaPosicionPixels > 0) {
          nuevaPosicionPixels = cambioX * 0.25; // Resistencia al arrastrar más a la izquierda de 'Pendientes'
        } else if (nuevaPosicionPixels < -anchoPantalla) {
          nuevaPosicionPixels = posicionBase + (cambioX * 0.25); // Resistencia al arrastrar más a la derecha de 'Completados'
        }

        // Mover el carrete exactamente junto al dedo en tiempo real
        carrete.style.transform = `translateX(${nuevaPosicionPixels}px)`;
      }, { passive: true });

      viewport.addEventListener("touchend", () => {
        if (!arrastrando || esScrollVertical) return;
        arrastrando = false;

        let anchoPantalla = viewport.clientWidth;
        let umbralCambio = anchoPantalla * 0.20; // Si arrastra más del 20% de la pantalla, cambia de pestaña

        carrete.classList.add("con-transicion");

        if (cambioX < -umbralCambio && columnaActual === 0) {
          moverAColumna(1); // Cambia a Completados
        } else if (cambioX > umbralCambio && columnaActual === 1) {
          moverAColumna(0); // Vuelve a Pendientes
        } else {
          moverAColumna(columnaActual); // Rebota y vuelve a su posición original
        }
        cambioX = 0;
      });
    }

    function moverAColumna(index) {
      columnaActual = index;
      const carrete = document.getElementById("carrete");
      
      // Activar animación suave
      carrete.classList.add("con-transicion");
      carrete.style.transform = `translateX(-${index * 50}%)`;

      // Sincronizar visualmente los botones superiores (Pestañas)
      document.getElementById('tab-pendientes').classList.toggle('activa', index === 0);
      document.getElementById('tab-completados').classList.toggle('activa', index === 1);
    }

    function conmutarTema() {
      const nuevoTema = document.documentElement.getAttribute("data-theme") === "oscuro" ? "claro" : "oscuro";
      document.documentElement.setAttribute("data-theme", nuevoTema);
      localStorage.setItem("tema-preferido", nuevoTema);
    }

    function configurarTemaInicial() {
      const tema = localStorage.getItem("tema-preferido") || "oscuro";
      document.documentElement.setAttribute("data-theme", tema);
    }

    function abrirVisor(ruta) {
  const visor = document.getElementById("visor-mapa");
  const imgAmpliada = document.getElementById("imagen-ampliada");
  imgAmpliada.src = ruta;
  visor.style.display = "flex";
}

function cerrarVisor() {
  const visor = document.getElementById("visor-mapa");
  visor.style.display = "none";
}

function procesarFechasYBarras(inicioStr, finStr) {
  if (!inicioStr || !finStr) return;
  const ahora = new Date();
  const fin = new Date(finStr);
  const inicio = new Date(inicioStr);
  
  // Calcular porcentaje de tiempo transcurrido
  const tiempoTotal = fin - inicio;
  const tiempoTranscurrido = ahora - inicio;
  let porcentaje = Math.floor((tiempoTranscurrido / tiempoTotal) * 100);
  porcentaje = Math.max(0, Math.min(100, porcentaje));
  
  // Lógica de textos según el momento
  let msgTiempo = "";
  let dias = 0;

  if (ahora < inicio) {
    // Aún no ha empezado
    dias = Math.ceil((inicio - ahora) / (1000 * 60 * 60 * 24));
    msgTiempo = `Faltan ${dias} días para que empiece la campaña`;
    porcentaje = 0; // Barra vacía si no ha empezado
  } else if (ahora > fin) {
    // Ya terminó
    msgTiempo = "Campaña concluida";
    porcentaje = 100;
  } else {
    // Durante la campaña
    dias = Math.ceil((fin - ahora) / (1000 * 60 * 60 * 24));
    msgTiempo = `Quedan ${dias} días de campaña`;
  }
  
  // Actualizar etiquetas
  if (document.getElementById("lbl-tiempo-restante")) document.getElementById("lbl-tiempo-restante").innerText = msgTiempo;
  if (document.getElementById("lbl-porcentaje-tiempo")) document.getElementById("lbl-porcentaje-tiempo").innerText = `${porcentaje}%`;
  
  const barra = document.getElementById("barra-progreso-elemento");
  if (barra) {
    barra.style.width = `${porcentaje}%`;
    
    // Limpiar clases
    barra.classList.remove("neon-verde", "neon-naranja", "neon-rojo");
    
    // Asignar color solo si la campaña está en curso (o cerca de terminar)
    if (ahora >= inicio && ahora <= fin) {
        if (dias <= 2) {
            barra.classList.add("neon-rojo");
        } else if (dias <= 7) {
            barra.classList.add("neon-naranja");
        } else {
            barra.classList.add("neon-verde");
        }
    }
  }
}

  </script>
  <div id="visor-mapa" class="visor-oculto" onclick="cerrarVisor()">
  <img id="imagen-ampliada" src="" alt="Mapa ampliado">
  <span class="btn-cerrar-visor">&times;</span>
</div>
</body>
</html>
