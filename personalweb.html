<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Campaña: Mis Territorios</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;1000&display=swap">

  <style>
    /* Variables de alto contraste */
    html[data-theme="oscuro"] {
      --fondo-pantalla: #09090b;
      --fondo-tarjeta: #2d2d35;
      --borde-tarjeta: rgba(255, 255, 255, 0.15);
      --sombra-tarjeta: rgba(0, 0, 0, 0.5) 0px 4px 12px;
      --texto-principal: #ffffff;
      --texto-secundario: #a1a1aa;
    }

    html[data-theme="claro"] {
      --fondo-pantalla: #e4e4e7;
      --fondo-tarjeta: #ffffff;
      --borde-tarjeta: rgba(0, 0, 0, 0.12);
      --sombra-tarjeta: rgba(0, 0, 0, 0.08) 0px 4px 14px;
      --texto-principal: #09090b;
      --texto-secundario: #71717a;
    }

    body {
      background-color: var(--fondo-pantalla);
      transition: background-color 0.4s ease, color 0.4s ease;
      color: var(--texto-principal);
      overflow-x: hidden; /* Evita barras de scroll horizontal molestas */
      padding-top: env(safe-area-inset-top); /* Esto es para que no se solape con el "notch" del iPhone */
        }

.cabecera-apple {
  /* Mantenemos la cabecera fija */
  position: sticky;
  top: 0;
  z-index: 999;
transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
will-change: background-color, backdrop-filter;
  /* Aplicamos el fondo dinámico del tema */
  background: var(--fondo-pantalla);
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  /* Añadimos transparencia y el efecto blur */
  /* El 0.8 es la opacidad: cuanto más bajo, más se ve a través */
  /* Usamos la variable de fondo, pero con transparencia (backdrop-filter) */
  
  
  /* Ajustamos el fondo para que sea semitransparente sobre el color base */
  opacity: 0.95; 
  
  /* Borde inferior suave para definir la cabecera */
  border-bottom: 1px solid var(--borde-tarjeta);
}

.cabecera-titulos h1 {
  font-size: 20px;      /* Ajustado para caber mejor */
  font-weight: 800;
  letter-spacing: -0.5px;
  white-space: nowrap;
}

.cabecera-titulos h2 {
  font-size: 16px;      /* Texto un poco mayor como pediste */
  color: var(--apple-azul);
  font-weight: 600;
  margin-top: 0;        /* Eliminado el margen superior */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

    /* Estilos para las pestañas (Tabs) similares a index.html */
    .contenedor-tabs {
      padding: 0 16px;
      margin-bottom: 16px;
    }
.btn-estilo-apple {
  background: var(--fondo-tarjeta) !important;
  border: 1px solid var(--borde-tarjeta) !important;
  width: 36px;
  height: 36px;
  border-radius: 50% !important;
  cursor: pointer;
  color: var(--texto-principal) !important;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--sombra-tarjeta) !important;
  transition: transform 0.1s ease, background 0.2s ease;
  padding: 0;
  flex-shrink: 0;
    transform: scale(0.95); /* Reduce ligeramente el tamaño al pulsarlo */
}
/* Clase que activa el giro constante */
.girando {
  animation: rotar 1s linear infinite;
}

@keyframes rotar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.btn-estilo-apple:active {
  transform: scale(0.9);
}

.btn-estilo-apple svg {
  width: 20px;
  height: 20px;
}

    .control-segmentado {
      background: rgba(0, 0, 0, 0.1);
      padding: 3px;
      border-radius: 12px;
      display: flex;
      border: 1px solid var(--borde-tarjeta);
       font-size: 16px
    }

    [data-theme="claro"] .control-segmentado {
      background: rgba(0, 0, 0, 0.05);
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--texto-secundario);
      padding: 10px 0;
      font-size: 16px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.activa {
      background: var(--fondo-tarjeta);
      color: var(--texto-principal);
      box-shadow: var(--sombra-tarjeta);
    }

    /* CONTENEDORES PARA EL EFECTO DE ARRASTRE TIPO APPLE */
    .viewport-deslizable {
      width: 100%;
      overflow: hidden;
      touch-action: pan-y; /* Permite scroll vertical libre pero bloquea el horizontal nativo */
    }

    .carrete-panoramico {
      display: flex;
      width: 200%; /* Dos pestañas = 200% del ancho */
      will-change: transform;
    }

    .carrete-panoramico.con-transicion {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); /* Curva suave de desaceleración Apple */
    }

    .seccion-tab-contenido {
      width: 50%; /* Cada sección ocupa exactamente la mitad del carrete (100% de la pantalla) */
      flex-shrink: 0;
    }
.grid-mapas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  /* Esto activa la animación automática de los elementos hijos */
  transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}


.tarjeta-mapa {
  background-color: var(--fondo-tarjeta) !important;
  border: 1px solid var(--borde-tarjeta) !important;
  box-shadow: var(--sombra-tarjeta) !important;
  border-radius: 14px;
  transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100%;
  /* Importante: permite que la tarjeta se mueva suavemente al recolocarse */
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
}

    .tarjeta-mapa .contenedor-imagen {
      position: relative;
      width: 100%;
      height: auto;
      background-color: var(--fondo-tarjeta);
    }

    .tarjeta-mapa .imagen-mapa {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .tarjeta-mapa .detalles-mapa {
      padding: 16px !important;
    }

    .numero-territorio-grande {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
.tarjeta-mapa.saliendo {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none; 
  /* Mantenemos el espacio para evitar saltos inmediatos */
  position: relative;
}


@keyframes animacionSalida {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.9); }
}
  /* 1. Mantenemos el contenedor de la marca de agua oculto por defecto */
.marca-agua-trabajado {
  display: none; 
  position: absolute;
  top: 0; 
  left: 0;
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
  transform: rotate(-30deg);
  color: rgba(255, 255, 255, 0.6);
  font-size: 1.8rem;
  font-weight: 900;
  z-index: 10;
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* 2. Solo cuando la tarjeta tiene la clase 'terminado', mostramos el bloque */
.tarjeta-mapa.terminado .marca-agua-trabajado {
  display: flex; /* Esto activa el centrado y la visibilidad */
}

/* 3. Aseguramos que la imagen se atenúe solo en las terminadas */
.tarjeta-mapa.terminado .imagen-mapa {
  filter: brightness(0.6) opacity(0.8);
}
   /* Botón de Acción (Verde) */
.btn-completar-accion {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: #34c759; /* Verde más vibrante, estándar iOS */
  color: #fff;
  border: none;
  border-radius: 12px; /* Alineado con tus tarjetas */
  font-weight: 700;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.btn-completar-accion:active {

  opacity: 0.8;
}

/* Botón de Desmarcar (Transparente) */
.btn-desmarcar-accion {

  border-radius: 12px;
  font-weight: 700;

}

.btn-desmarcar-accion:active {
  transform: scale(0.97);
  background: rgba(0, 0, 0, 0.05); /* Feedback sutil al pulsar */
}

/* Nuevo estilo para el visor */
#visor-mapa {

<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
  <div class="cabecera-titulos">
    <h1>Campaña</h1>
    <h2 id="txt-campana-hermano">Cargando Campaña...</h2>
  </div>
  
  <div class="cabecera-acciones" style="display: flex; gap: 10px;">
    <button id="btn-refresh" class="btn-estilo-apple" onclick="recargarApp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
    
    <button id="btn-cambiar-tema" class="btn-estilo-apple" onclick="conmutarTema()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      </svg>
    </button>
  </div>
</header>

<footer class="barra-tiempo-footer">
  <div class="info-tiempo-texto">
    <span id="lbl-tiempo-restante">Calculando progreso...</span>
    <span id="lbl-porcentaje-tiempo">0%</span>
  </div>
  <div class="linea-progreso-fondo">
    <div id="barra-progreso-elemento" class="linea-progreso-relleno"></div>
  </div>
</footer>

    <div class="contenedor-tabs">
      <div class="control-segmentado">
        <button id="tab-pendientes" class="tab activa" onclick="moverAColumna(0)">Pendientes</button>
        <button id="tab-completados" class="tab" onclick="moverAColumna(1)">Completados</button>
      </div>
    </div>

    <div class="viewport-deslizable" id="viewport-tactil">
      <div class="carrete-panoramico con-transicion" id="carrete">
        
        <div class="seccion-tab-contenido">
          <main class="grid-mapas" id="grid-pendientes"></main>
        </div>

        <div class="seccion-tab-contenido">
          <main class="grid-mapas" id="grid-completados"></main>
        </div>

      </div>
    </div>
  </div>

  <script>
    const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    let datosLocalesHermano = [];
    let idHermanoUrl = null;

    // Variables de control de arrastre mecánico (Física estilo Apple)
    let columnaActual = 0; // 0: Pendientes, 1: Completados
    let inicioX = 0;
    let inicioY = 0;
    let cambioX = 0;
    let arrastrando = false;
    let esScrollVertical = false;

    window.addEventListener("DOMContentLoaded", () => {
      configurarTemaInicial();
      const params = new URLSearchParams(window.location.search);
      idHermanoUrl = params.get("id");
      if (!idHermanoUrl) return;
      cargarDatosFlujoHermano();
      configurarArrastreMecanico();
      document.addEventListener('click', (e) => {
  // Comprobamos si el elemento clicado es uno de nuestros botones
  const btn = e.target.closest('.btn-completar-accion, .btn-desmarcar-accion');
  if (!btn) return; // Si no es un botón de acción, no hacemos nada

  const idMapa = btn.dataset.id;
  const modo = btn.dataset.modo;
  
  // Llamamos a la función que mueve la tarjeta
  cambiarEstadoTerritorio(btn, idMapa, modo);
});
    });

    async function cargarDatosFlujoHermano() {
  try {
    const respuesta = await fetch(`${URL_API_SHEETS}?accion=leerDatos`);
    const data = await respuesta.json();
    if (data && data.length > 0) {
      document.getElementById("txt-campana-hermano").innerText = data[0].campana || "Campaña Activa";
      
      // CAMBIO AQUÍ: Pasamos los valores que vienen en el JSON
      // Asegúrate de que 'inicio' y 'fin' coincidan con los nombres de tus columnas en Sheets
      procesarFechasYBarras(data[0].inicio, data[0].fin); 
      
      datosLocalesHermano = data.filter(item => item.hermano.toLowerCase().trim() === idHermanoUrl.toLowerCase().trim());
      inyectarTarjetasHermano();
    }
  } catch (err) { console.error(err); }
}


    /**
 * Función principal que filtra los datos y decide qué mostrar en cada contenedor.
 * Se llama cada vez que cambia el estado de un territorio.
 */
function inyectarTarjetasHermano() {
  const gP = document.getElementById("grid-pendientes");
  const gC = document.getElementById("grid-completados");

  // 1. ORDENAR: Aseguramos que siempre estén por ID (numérico)
  datosLocalesHermano.sort((a, b) => parseInt(a.id) - parseInt(b.id));

  // 2. Fragmentos para mantener el orden
  const fragmentoP = document.createDocumentFragment();
  const fragmentoC = document.createDocumentFragment();

  datosLocalesHermano.forEach(mapa => {
    const tarjeta = crearTarjetaDOM(mapa);
    if (!mapa.trabajado) fragmentoP.appendChild(tarjeta);
    else fragmentoC.appendChild(tarjeta);
  });

  // 3. Limpiar y rellenar
  gP.innerHTML = "";
  gP.appendChild(fragmentoP);
  gC.innerHTML = "";
  gC.appendChild(fragmentoC);
}

/**
 * Función encargada de pintar el DOM dentro de un contenedor específico.
 * Utiliza un mensaje de aviso si la lista está vacía.
 */
function renderizarLista(contenedor, lista, msgVacio) {
  // Limpiamos el contenedor actual
  contenedor.innerHTML = "";

  if (lista.length === 0) {
    // Si no hay elementos, mostramos el mensaje informativo
    contenedor.innerHTML = `
      <p style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--texto-secundario); font-style: italic;">
        ${msgVacio}
      </p>`;
    return;
  }

  // Si hay elementos, creamos y añadimos cada tarjeta individualmente
  lista.forEach(mapa => {
    const tarjeta = crearTarjetaDOM(mapa);
    contenedor.appendChild(tarjeta);
  });
}

   function crearTarjetaDOM(mapa) {
  const div = document.createElement("div");
  div.className = `tarjeta-mapa ${mapa.trabajado ? 'terminado' : ''}`;

  // DEFINICIÓN ÚNICA DEL BOTÓN (Usando data-id y data-modo)
  const botonHTML = `
    <button class="${mapa.trabajado ? 'btn-desmarcar-accion' : 'btn-completar-accion'}" 
            data-id="${mapa.id}" 
            data-modo="${mapa.trabajado ? 'desmarcar' : 'completar'}">
      ${mapa.trabajado ? 'Reactivar territorio' : 'Marcar como completado'}
    </button>`;

  div.innerHTML = `
    <div class="contenedor-imagen">
      <div class="marca-agua-trabajado">TRABAJADO</div>
      <img src="${mapa.rutaMapa}" class="imagen-mapa" onclick="abrirVisor('${mapa.rutaMapa}')" style="cursor: pointer;">
    </div>
    <div class="detalles-mapa">
      <div style="display:flex; justify-content:space-between;">
        <h3 style="margin-top: 5px; margin-bottom: 0; font-size: 20px;">${mapa.barriada}</h3>
        <span class="numero-territorio-grande">${mapa.id}</span>
      </div>
      ${botonHTML}
    </div>
  `;
  return div;
}

  async function cambiarEstadoTerritorio(btn, idMapa, modo) {
  const tarjeta = btn.closest('.tarjeta-mapa');
  const esCompletar = (modo === "completar");
  const contenedorDestino = esCompletar 
    ? document.getElementById("grid-completados") 
    : document.getElementById("grid-pendientes");

  // 1. Animación de salida
  tarjeta.classList.add('saliendo');
  await new Promise(r => setTimeout(r, 400));
  
  // 2. Actualizar estado interno
  const idx = datosLocalesHermano.findIndex(i => i.id.toString() === idMapa.toString());
  if (idx !== -1) datosLocalesHermano[idx].trabajado = esCompletar;

  // 3. Modificar visualmente la tarjeta
  tarjeta.classList.remove('saliendo');
  tarjeta.classList.toggle('terminado', esCompletar);
  btn.innerText = esCompletar ? 'Reactivar territorio' : 'Marcar como completado';
  btn.className = esCompletar ? 'btn-desmarcar-accion' : 'btn-completar-accion';
  btn.dataset.modo = esCompletar ? 'desmarcar' : 'completar';

  // 4. EFECTO DE CELEBRACIÓN (Confeti y Vibración)
  if (esCompletar) {
      confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#3498db', '#27ae60', '#ffffff'] // Colores Apple-style
      });
      
      if (navigator.vibrate) {
          navigator.vibrate(100);
      }
  }

  // 5. INSERCIÓN ORDENADA
  const tarjetasEnDestino = Array.from(contenedorDestino.querySelectorAll('.tarjeta-mapa'));
  let insertada = false;
  for (let t of tarjetasEnDestino) {
    const idExistente = parseInt(t.querySelector('.numero-territorio-grande').innerText);
    if (parseInt(idMapa) < idExistente) {
      contenedorDestino.insertBefore(tarjeta, t);
      insertada = true;
      break;
    }
  }

  if (!insertada) {
    contenedorDestino.appendChild(tarjeta);
  }
  
  // 6. Sincronizar servidor
  fetch(`${URL_API_SHEETS}?accion=actualizarTrabajo&id=${idMapa}&estado=${esCompletar}`, { mode: 'no-cors' });
  procesarFechasYBarras();
}



    /* LÓGICA DE FÍSICA Y ARRASTRE EN TIEMPO REAL (Estilo Apple) */
    function configurarArrastreMecanico() {
      const viewport = document.getElementById("viewport-tactil");
      const carrete = document.getElementById("carrete");

      viewport.addEventListener("touchstart", (e) => {
        inicioX = e.touches[0].clientX;
        inicioY = e.touches[0].clientY;
        arrastrando = true;
        esScrollVertical = false;
        // Quitamos la transición temporalmente para que responda instantáneamente al dedo
        carrete.classList.remove("con-transicion");
      }, { passive: true });

      viewport.addEventListener("touchmove", (e) => {
        if (!arrastrando) return;

        let actualX = e.touches[0].clientX;
        let actualY = e.touches[0].clientY;

        cambioX = actualX - inicioX;
        let cambioY = actualY - inicioY;

        // Detectar si el usuario quiere hacer scroll hacia abajo en vez de deslizar lateralmente
        if (!esScrollVertical && Math.abs(cambioY) > Math.abs(cambioX) && Math.abs(cambioY) > 10) {
          esScrollVertical = true;
          arrastrando = false;
          return;
        }

        if (esScrollVertical) return;

        // Calcular la posición base en píxeles de la pestaña actual
        let anchoPantalla = viewport.clientWidth;
        let posicionBase = -columnaActual * anchoPantalla;
        let nuevaPosicionPixels = posicionBase + cambioX;

        // Límites elásticos estilo resistencia iOS en los extremos
        if (nuevaPosicionPixels > 0) {
          nuevaPosicionPixels = cambioX * 0.25; // Resistencia al arrastrar más a la izquierda de 'Pendientes'
        } else if (nuevaPosicionPixels < -anchoPantalla) {
          nuevaPosicionPixels = posicionBase + (cambioX * 0.25); // Resistencia al arrastrar más a la derecha de 'Completados'
        }

        // Mover el carrete exactamente junto al dedo en tiempo real
        carrete.style.transform = `translateX(${nuevaPosicionPixels}px)`;
      }, { passive: true });

      viewport.addEventListener("touchend", () => {
        if (!arrastrando || esScrollVertical) return;
        arrastrando = false;

        let anchoPantalla = viewport.clientWidth;
        let umbralCambio = anchoPantalla * 0.20; // Si arrastra más del 20% de la pantalla, cambia de pestaña

        carrete.classList.add("con-transicion");

        if (cambioX < -umbralCambio && columnaActual === 0) {
          moverAColumna(1); // Cambia a Completados
        } else if (cambioX > umbralCambio && columnaActual === 1) {
          moverAColumna(0); // Vuelve a Pendientes
        } else {
          moverAColumna(columnaActual); // Rebota y vuelve a su posición original
        }
        cambioX = 0;
      });
    }

    function moverAColumna(index) {
      columnaActual = index;
      const carrete = document.getElementById("carrete");
      
      // Activar animación suave
      carrete.classList.add("con-transicion");
      carrete.style.transform = `translateX(-${index * 50}%)`;

      // Sincronizar visualmente los botones superiores (Pestañas)
      document.getElementById('tab-pendientes').classList.toggle('activa', index === 0);
      document.getElementById('tab-completados').classList.toggle('activa', index === 1);
    }

    function conmutarTema() {
  const nuevoTema = document.documentElement.getAttribute("data-theme") === "oscuro" ? "claro" : "oscuro";
  document.documentElement.setAttribute("data-theme", nuevoTema);
  localStorage.setItem("tema-preferido", nuevoTema);

  // --- FUERZA EL REPINTADO DE LA CAPA STICKY ---
  const cabecera = document.querySelector('.cabecera-apple');
  
  // Esto obliga al navegador a re-renderizar la cabecera aunque esté en medio de un scroll
  cabecera.style.visibility = 'hidden';
  // Pequeño truco para forzar el repintado inmediato
  requestAnimationFrame(() => {
    cabecera.style.visibility = 'visible';
  });
}



    function configurarTemaInicial() {
      const tema = localStorage.getItem("tema-preferido") || "oscuro";
      document.documentElement.setAttribute("data-theme", tema);
    }

    function abrirVisor(ruta) {
  const visor = document.getElementById("visor-mapa");
  const imgAmpliada = document.getElementById("imagen-ampliada");
  imgAmpliada.src = ruta;
  visor.style.display = "flex";
}

function cerrarVisor() {

}

function procesarFechasYBarras(inicioStr, finStr) {
  if (!inicioStr || !finStr) return;
  const ahora = new Date();
  const fin = new Date(finStr);
  const inicio = new Date(inicioStr);
  
  // Calcular porcentaje de tiempo transcurrido
  const tiempoTotal = fin - inicio;
  const tiempoTranscurrido = ahora - inicio;
  let porcentaje = Math.floor((tiempoTranscurrido / tiempoTotal) * 100);
  porcentaje = Math.max(0, Math.min(100, porcentaje));
  
  // Lógica de textos según el momento
  let msgTiempo = "";
  let dias = 0;

  if (ahora < inicio) {
    // Aún no ha empezado
    dias = Math.ceil((inicio - ahora) / (1000 * 60 * 60 * 24));
    msgTiempo = `Faltan ${dias} días para que empiece la campaña`;
    porcentaje = 0; // Barra vacía si no ha empezado
  } else if (ahora > fin) {
    // Ya terminó
    msgTiempo = "Campaña concluida";
    porcentaje = 100;
  } else {
    // Durante la campaña
    dias = Math.ceil((fin - ahora) / (1000 * 60 * 60 * 24));
    msgTiempo = `Quedan ${dias} días de campaña`;
  }
  
  // Actualizar etiquetas
  if (document.getElementById("lbl-tiempo-restante")) document.getElementById("lbl-tiempo-restante").innerText = msgTiempo;
  if (document.getElementById("lbl-porcentaje-tiempo")) document.getElementById("lbl-porcentaje-tiempo").innerText = `${porcentaje}%`;
  
  const barra = document.getElementById("barra-progreso-elemento");
  if (barra) {
    barra.style.width = `${porcentaje}%`;
    
    // Limpiar clases
    barra.classList.remove("neon-verde", "neon-naranja", "neon-rojo");
    
    // Asignar color solo si la campaña está en curso (o cerca de terminar)
    if (ahora >= inicio && ahora <= fin) {
        if (dias <= 2) {
            barra.classList.add("neon-rojo");
        } else if (dias <= 7) {
            barra.classList.add("neon-naranja");
        } else {
            barra.classList.add("neon-verde");
        }
    }
  }
}
async function recargarApp() {
  const btn = document.getElementById("btn-refresh");
  const svg = btn.querySelector("svg");
  
  // 1. Empezamos a girar al pulsar
  svg.classList.add("girando");
  
  try {
    // 2. Esperamos a que los datos se descarguen y procesen
    await cargarDatosFlujoHermano();
  } catch (error) {
    console.error("Error al recargar:", error);
  } finally {
    // 3. Paramos el giro SIEMPRE (tanto si sale bien como si hay error)
    svg.classList.remove("girando");
  }
}
