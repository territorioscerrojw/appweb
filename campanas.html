<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territorios por Cercanía</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;1000&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <h1>Territorios</h1>
      <button onclick="ordenarPorProximidad()" class="btn-apple">Ordenar por Distancia</button>
    </header>
    
    <div id="lista-territorios" class="contenedor-grid" style="margin-top: 20px;">
      </div>
  </div>

  <script src="app.js"></script>
  <script>
    // 1. Al cargar la página, traemos los datos
    window.addEventListener("DOMContentLoaded", async () => {
      // Usamos la función de carga que ya tienes en app.js
      // Si tu función en app.js no llena 'baseDatosCompleta', 
      // cámbiala por un fetch directo a tu URL_API_SHEETS
      await cargarDatos(); 
    });

    // 2. Lógica de cálculo de distancia
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371; 
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // 3. Ordenar y pintar
    function ordenarPorProximidad() {
      if (!navigator.geolocation) return alert("Geolocalización no disponible");
      
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        
        baseDatosCompleta.forEach(t => {
          if (t.coordenadas && t.coordenadas.includes(',')) {
            const [lat, lon] = t.coordenadas.split(',').map(Number);
            t.distancia = calcularDistancia(latitude, longitude, lat, lon);
          } else {
            t.distancia = 999999;
          }
        });

        baseDatosCompleta.sort((a, b) => a.distancia - b.distancia);
        
        const contenedor = document.getElementById('lista-territorios');
        contenedor.innerHTML = baseDatosCompleta.map(t => `
          <div class="tarjeta">
            <h3>${t.id} - ${t.barriada}</h3>
            <p>Distancia: ${t.distancia === 999999 ? 'No disponible' : t.distancia.toFixed(2) + ' km'}</p>
            <p style="font-size: 0.8em; color: var(--texto-secundario)">${t.prioritario === 'SI' ? '🔴 Prioritario' : '✅ Normal'}</p>
          </div>
        `).join('');
      });
    }
  </script>
</body>
</html>
