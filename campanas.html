<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territorios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="contenedor-app">
    <header class="cabecera-apple">
      <h1>Territorios</h1>
      <button onclick="iniciarOrdenacion()" class="btn-apple">Ordenar por Distancia</button>
    </header>
    
    <div id="lista-territorios" class="contenedor-grid" style="padding: 15px;">
      <p id="mensaje-estado">Cargando territorios...</p>
    </div>
  </div>

  <script>
    // URL directa a tu Google Script (asegúrate de que sea la correcta)
    const URL_API = "https://script.google.com/macros/s/AKfycbw0Vt1KuZyBTeJtLuuy7BV6nF2v_PpVDMy_DpD7o6iL8gxsZ1aSDCcjUsyUOb0m_ouVbQ/exec";
    let baseDatosCompleta = [];

    // 1. Cargar datos al abrir
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const respuesta = await fetch(URL_API + "?accion=leerDatos");
        baseDatosCompleta = await respuesta.json();
        
        // Renderizado inicial sin ordenar
        renderizar(baseDatosCompleta);
      } catch (err) {
        document.getElementById('mensaje-estado').innerText = "Error cargando datos. Revisa la consola (F12).";
        console.error(err);
      }
    });

    // 2. Lógica de renderizado (usa la clase .tarjeta de tu styles.css)
    function renderizar(datos) {
      const contenedor = document.getElementById('lista-territorios');
      contenedor.innerHTML = datos.map(t => `
        <div class="tarjeta">
          <h3>${t.id} - ${t.barriada}</h3>
          <p style="color:var(--texto-secundario)">${t.distancia ? t.distancia.toFixed(2) + ' km' : 'Distancia no calculada'}</p>
        </div>
      `).join('');
    }

    // 3. Ordenar por cercanía
    function iniciarOrdenacion() {
      if (!navigator.geolocation) return alert("Tu navegador no soporta geolocalización");
      
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        
        baseDatosCompleta.forEach(t => {
          if (t.coordenadas && t.coordenadas.includes(',')) {
            const [lat, lon] = t.coordenadas.split(',').map(Number);
            const dLat = (lat - latitude) * Math.PI / 180;
            const dLon = (lon - longitude) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(latitude*Math.PI/180) * Math.cos(lat*Math.PI/180) * Math.sin(dLon/2)**2;
            t.distancia = 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          } else { t.distancia = 99999; }
        });

        baseDatosCompleta.sort((a, b) => a.distancia - b.distancia);
        renderizar(baseDatosCompleta);
      }, (err) => {
        alert("Debes aceptar el permiso de ubicación para ordenar por cercanía.");
      });
    }
  </script>
</body>
</html>
