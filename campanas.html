<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
  <meta charset="UTF-8">
  <title>Territorios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="contenedor-app">
    <header class="cabecera-apple">
      <h1>Territorios</h1>
      <button onclick="ordenarPorProximidad()" class="btn-apple">Ordenar por distancia</button>
    </header>
    
    <div id="lista-territorios" class="contenedor-grid"></div>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      // 1. Cargamos todos los datos (igual que en index.html)
      await cargarDatos(); 
      // 2. Ordenamos automáticamente al cargar
      ordenarPorProximidad();
    });

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function ordenarPorProximidad() {
      if (!navigator.geolocation) return alert("Activa tu GPS");
      
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        
        baseDatosCompleta.forEach(t => {
          if (t.coordenadas && t.coordenadas.includes(',')) {
            const [lat, lon] = t.coordenadas.split(',').map(Number);
            t.distancia = calcularDistancia(latitude, longitude, lat, lon);
          } else { t.distancia = 9999; }
        });

        baseDatosCompleta.sort((a, b) => a.distancia - b.distancia);
        
        // REUTILIZAMOS LA LÓGICA DE RENDERIZADO DE TU APP
        renderizarTerritorios(baseDatosCompleta);
      });
    }

    // Esta función debe coincidir con la que usa index.html (seguramente la tienes en app.js)
    function renderizarTerritorios(lista) {
      const contenedor = document.getElementById('lista-territorios');
      // Asegúrate de que las clases 'tarjeta' existan en tu styles.css
      contenedor.innerHTML = lista.map(t => `
        <div class="tarjeta">
          <h3>${t.id} - ${t.barriada}</h3>
          <p>Distancia: ${t.distancia.toFixed(2)} km</p>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
